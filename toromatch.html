<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroMatch - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .seleccion-wrapper { width: 95%; max-width: 1200px; margin: 10vh auto 50px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        .box { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; }
        .box h3 { margin-top: 0; color: #FFD342; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; text-align: center; font-size: 1.2rem;}
        
        /* Columna Izquierda */
        .left-col { display: flex; flex-direction: column; gap: 20px; }
        
        /* Marcador en vivo */
        .live-box { text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-color: #2df2c1; box-shadow: 0 0 15px rgba(45, 242, 193, 0.1); }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: #2df2c1; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;}
        .status-circle.green { width: 12px; height: 12px; background-color: #2df2c1; border-radius: 50%; box-shadow: 0 0 10px rgba(45, 242, 193, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .score-text { font-size: 2.2rem; font-weight: bold; color: white; letter-spacing: 2px; }

        /* Pestañas Partidos */
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #7d7d7d; font-weight: bold; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid #FFD342; color: #FFD342; }
        .tab:hover:not(.active) { color: white; }
        .tab-content { display: none; min-height: 200px; }
        .tab-content.active { display: block; }
        
        .match-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; font-size: 1.1rem; }
        .match-date { color: #7d7d7d; font-size: 0.9rem; border-left: 1px solid #333; padding-left: 15px; }

        /* Botón Editar */
        .edit-btn { position: absolute; bottom: 20px; right: 20px; background: transparent; color: #e6683c; border: 2px solid #e6683c; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        .edit-btn:hover { background: #e6683c; color: white; }

        /* Columna Derecha */
        .right-col { display: flex; flex-direction: column; gap: 20px; }
        
        /* Lista de Jugadores (Adaptada a nombre_rol - nombre_jugador) */
        .list-box ul { list-style-type: none; padding: 0; margin: 0; }
        .list-box li { padding: 12px 0; border-bottom: 1px dashed #333; color: #bdc3c7; font-size: 0.95rem; }
        .list-box li::before { content: "🥊 "; color: #FFD342; font-size: 1.1rem; }
        
        @media (max-width: 900px) { .seleccion-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="close-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></div>
            <a href="#" onclick="if(localStorage.getItem('toroHaxLoggedId')){ window.location.href='perfil.html'; } else { window.location.href='login.html'; } return false;"><i class="fa-solid fa-user"></i> Perfil</a>
            <a href="#" onclick="checkLogin('vip.html')"><i class="fa-solid fa-gem"></i> VIP</a>
            <a href="#" onclick="checkLogin('tienda.html')"><i class="fa-solid fa-cart-shopping"></i> Tienda</a>
            <a href="index.html"><i class="fa-solid fa-house"></i> Menú principal</a>
        </div>
        <div class="sidebar-bottom">
            <a href="#" class="logout-btn" onclick="confirmarLogout()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a>
        </div>
    </nav>
    <header></header>

    <div class="seleccion-wrapper">
        <div class="left-col">
            <div class="box live-box">
                <div id="liveIndicator" style="display: none;" class="live-indicator"><span class="status-circle green"></span> En vivo</div>
                <div id="liveIndicatorOff" class="live-indicator" style="color: #7d7d7d;"><span class="status-circle" style="background:#cc2a2a;"></span> Offline</div>
                <div class="score-text" id="liveScore">Esperando conexión...</div>
            </div>

            <div class="box" style="padding-bottom: 60px;">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('proximos')">Próximo express</div>
                    <div class="tab" onclick="switchTab('historial')">Historial</div>
                </div>

                <div id="proximos" class="tab-content active">
                    <div class="match-row">Equipo A vs Equipo B <span class="match-date">20/06/2026</span></div>
                </div>

                <div id="historial" class="tab-content">
                    <div class="match-row">Rol1 3 - 2 Rol2 <span class="match-date">04/05/2026</span></div>
                    <div class="match-row">Rol1 1 - 4 Rol2 <span class="match-date">28/04/2026</span></div>
                </div>

                <button id="btnEditar" class="edit-btn"><i class="fa-solid fa-pen"></i> Editar</button>
            </div>
        </div>

        <div class="right-col">
            <div class="box list-box" style="flex: 1;">
                <h3>⚽ Jugadores</h3>
                <ul id="listaJugadores"><li>Cargando plantel...</li></ul>
            </div>
        </div>
    </div>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => sidebar.classList.add('active'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));
        function checkLogin(page) { if (localStorage.getItem('toroHaxLoggedId')) window.location.href = page; else window.location.href = 'login.html'; }
        function confirmarLogout() { if(confirm("⚠️ ¿Estás seguro que quieres cerrar sesión?")) { localStorage.removeItem('toroHaxLoggedId'); window.location.href = 'index.html'; } }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        const loggedId = localStorage.getItem('toroHaxLoggedId') || 'null';

        // 1. Cargar Jugadores de ToroMatch y Permisos
        fetch(`https://torobot-izu5.onrender.com/api/toromatch/data?numericId=${loggedId}`)
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                if(data.canEdit) document.getElementById('btnEditar').style.display = 'block';

                const ulJugadores = document.getElementById('listaJugadores');
                ulJugadores.innerHTML = '';
                if(data.jugadores.length > 0) {
                    data.jugadores.forEach(jug => ulJugadores.innerHTML += `<li>${jug}</li>`);
                } else {
                    ulJugadores.innerHTML = '<li>No hay jugadores registrados en ToroMatch.</li>';
                }
            }
        });

        // 2. Cargar Marcador en Vivo de ToroMatch
        function actualizarMarcador() {
            fetch('https://torobot-izu5.onrender.com/api/toromatch/live')
            .then(res => res.json())
            .then(data => {
                const indOn = document.getElementById('liveIndicator');
                const indOff = document.getElementById('liveIndicatorOff');
                const score = document.getElementById('liveScore');
                
                score.innerText = data.text;
                
                if (data.active) {
                    indOn.style.display = 'flex';
                    indOff.style.display = 'none';
                    document.querySelector('.live-box').style.borderColor = '#2df2c1';
                } else {
                    indOn.style.display = 'none';
                    indOff.style.display = 'flex';
                    document.querySelector('.live-box').style.borderColor = '#333';
                    score.innerText = "ESPERANDO CONEXIÓN"; 
                }
            });
        }
        actualizarMarcador();
        setInterval(actualizarMarcador, 5000);
    </script>
</body>
</html>
