<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rankings - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { overflow-x: hidden; width: 100%; position: relative; overflow-y: auto; }

        main { display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 1000px; margin: 5vh auto 50px; text-align: center; }
        
        .rankings-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 30px; }
        .my-rank-alert { background: rgba(45, 242, 193, 0.1); color: #2df2c1; border: 1px solid #2df2c1; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; display: none; width: 100%; max-width: 600px; box-shadow: 0 0 10px rgba(45, 242, 193, 0.2);}
        
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 500px; }
        .search-container input { flex-grow: 1; background: #111; color: white; border: 1px solid #555; padding: 12px; border-radius: 8px; outline: none; text-align: center; font-size: 1rem;}
        .search-container input:focus { border-color: #FFD342; }
        .search-container button { background: #FFD342; color: #111; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; flex-shrink: 0;}
        .search-container button:hover { transform: scale(1.05); }

        .filter-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; border: 1px solid #333; width: 100%; max-width: 470px;}
        .filter-btn { background: transparent; color: #bdc3c7; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1.05rem; }
        .filter-btn:hover { color: #FFD342; }
        .filter-btn.active { background: #FFD342; color: #111; box-shadow: 0 0 15px rgba(104, 201, 163, 0.4); }

        .tabs-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 100%;}
        .tab-btn { background: rgba(0,0,0,0.5); color: #bdc3c7; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; flex-grow: 1; max-width: 180px;}
        .tab-btn:hover { background: rgba(255, 211, 66, 0.1); border-color: #FFD342; color: #FFD342; }
        .tab-btn.active { background: #FFD342; color: #111; border-color: #FFD342; box-shadow: 0 0 15px rgba(255, 211, 66, 0.4); }

        .table-container { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 100%; -webkit-overflow-scrolling: touch; }
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: center; }
        th { background: rgba(0,0,0,0.6); color: #FFD342; padding: 15px; font-size: 1.1rem; border-bottom: 2px solid #333; }
        td { padding: 15px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; cursor: pointer; transition: 0.2s;} 
        tr:hover td { background: rgba(255,211,66,0.1); }
        
        .highlighted-row { background: rgba(255, 211, 66, 0.2) !important; outline: 2px solid #FFD342; animation: blinkRow 2s infinite;}
        @keyframes blinkRow { 0% { background: rgba(255, 211, 66, 0.4); } 50% { background: rgba(255, 211, 66, 0.1); } 100% { background: rgba(255, 211, 66, 0.4); } }

        .rank-number { font-weight: bold; font-size: 1.2rem; color: #bdc3c7; }
        .rank-1 { color: #FFD700; font-size: 1.5rem; } 
        .rank-2 { color: #C0C0C0; font-size: 1.4rem; } 
        .rank-3 { color: #CD7F32; font-size: 1.3rem; } 

        .player-name { font-weight: bold; color: #2df2c1; text-align: left; }
        .player-id { color: #7d7d7d; font-size: 0.8rem; margin-left: 5px; }
        .rango-badge { font-size: 1.3rem; }

        .pagination { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 30px; width: 100%; max-width: 100%;}
        .page-btn { background: #111; color: #FFD342; border: 1px solid #FFD342; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        .page-btn:hover:not(:disabled) { background: #FFD342; color: #111; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; }
        
        .page-info-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 8px; border: 1px solid #333; }
        .page-input { width: 50px; background: #111; border: 1px solid #5dc8e8; color: #FFD342; text-align: center; font-weight: bold; padding: 5px; border-radius: 4px; outline: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 1px solid #FFD342; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; color: white; text-align: center; position: relative;}
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #cc2a2a; cursor: pointer; transition: 0.3s;}
        .close-modal:hover { transform: scale(1.2); }
        .modal-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #FFD342; margin-bottom: 10px;}
        .modal-name { color: #FFD342; font-size: 1.5rem; margin: 0; text-transform: uppercase;}
        .modal-id { color: #7d7d7d; font-size: 0.9rem; margin-bottom: 15px; display: block;}
        .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid #333;}
        .modal-stats p { margin: 5px 0; color: #bdc3c7; font-size: 0.95rem;}
        .modal-stats strong { color: white; }

        @media (max-width: 768px) { 
            .tab-btn { max-width: 48%; font-size: 0.95rem; padding: 10px; }
            .filter-container { flex-direction: row; flex-wrap: wrap; border-radius: 15px; padding: 10px; }
            .filter-btn { width: 45%; padding: 10px; font-size: 0.95rem;}
        }

        @media (max-width: 480px) {
            .rankings-title { font-size: 1.8rem; }
            main { margin-top: 3vh; width: 100%; padding: 0 10px; max-width: 100vw; }
            table { min-width: 450px; }
            th, td { padding: 10px 5px; font-size: 0.95rem; }
            .player-id { display: block; margin-left: 0; margin-top: 2px; font-size: 0.75rem; }
            .tab-btn { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <h2 class="rankings-title">TOPS de ToroHax</h2>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por Nombre o ID Numérica...">
            <button onclick="buscarJugador()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" id="btnFilterGeneral" onclick="cambiarFiltro('general')"><i class="fa-solid fa-globe"></i> Global</button>
            <button class="filter-btn" id="btnFilterAmigos" onclick="cambiarFiltro('amigos')"><i class="fa-solid fa-user-group"></i> Amigos</button>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="cambiarCategoria('general', this)"><i class="fa-solid fa-trophy"></i> General</button>
            <button class="tab-btn" onclick="cambiarCategoria('goles', this)"><i class="fa-solid fa-futbol"></i> Goles</button>
            <button class="tab-btn" onclick="cambiarCategoria('asistencias', this)"><i class="fa-solid fa-handshake-angle"></i> Asistencias</button>
            <button class="tab-btn" onclick="cambiarCategoria('defensas', this)"><i class="fa-solid fa-shield-halved"></i> Defensas</button>
            <button class="tab-btn" onclick="cambiarCategoria('arqueros', this)"><i class="fa-solid fa-hands-holding-circle"></i> Arqueros</button>
        </div>

        <div id="myRankAlert" class="my-rank-alert">
            <i class="fa-solid fa-ranking-star"></i> Tu posición actual: <span id="myPositionNumber">...</span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="10%">#</th>
                        <th width="40%" style="text-align: left;">Jugador</th>
                        <th width="20%">Partidos</th>
                        <th width="15%" id="colHeader1">Rango</th>
                        <th width="15%" id="colHeader2">MVPs</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr><td colspan="5" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Cargando datos desde la cancha...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="btnPrev" onclick="cambiarPagina(-1)"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
            <div class="page-info-box">
                <span>Ir a Pág:</span>
                <input type="number" id="pageInput" class="page-input" value="1" min="1" onchange="saltarAPagina()">
                <span>de <span id="totalPagesDisplay">1</span></span>
            </div>
            <button class="page-btn" id="btnNext" onclick="cambiarPagina(1)">Siguiente <i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <div class="modal-overlay" id="playerModal" onclick="cerrarModalClickFuera(event)">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="cerrarModal()"></i>
            <img id="m_avatar" class="modal-avatar" src="" alt="Avatar">
            <h2 id="m_name" class="modal-name">Cargando...</h2>
            <span id="m_id" class="modal-id">#...</span>
            
            <div class="modal-stats" id="m_stats">
                <p><i class="fa-solid fa-gamepad"></i> Partidos: <strong id="m_pj">...</strong></p>
                <p><i class="fa-solid fa-trophy"></i> WinRate: <strong id="m_wr">...</strong>%</p>
                <p><i class="fa-solid fa-futbol"></i> Goles: <strong id="m_g">...</strong></p>
                <p><i class="fa-solid fa-handshake-angle"></i> Asist: <strong id="m_a">...</strong></p>
                <p><i class="fa-solid fa-shield-halved"></i> Recup: <strong id="m_d">...</strong></p>
                <p><i class="fa-solid fa-hands-holding-circle"></i> Atajadas: <strong id="m_at">...</strong></p>
            </div>
        </div>
    </div>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        let categoriaActual = 'general';
        let filtroActual = 'general';
        let paginaActual = 1;
        let totalPaginas = 1;
        let targetHighlightId = null; 
        const loggedUserId = localStorage.getItem('toroHaxLoggedId') || '';

        const encabezados = {
            'general': ['Rango', 'MVPs'],
            'goles': ['Total Goles', 'Goles / Partido'],
            'asistencias': ['Asistencias', 'Asist. / Partido'],
            'defensas': ['Recuperaciones', 'Recup. / Partido'],
            'arqueros': ['Atajadas', 'Atajadas / Partido']
        };

        function getNivelRango(elo, min, max) {
            const tercio = (max - min) / 3;
            if (elo < min + tercio) return "1️⃣";
            if (elo < min + tercio * 2) return "2️⃣";
            return "3️⃣";
        }

        function getPlayerRankString(elo) {
            const currentElo = elo !== undefined ? elo : 200;
            let avatar = ""; let nivel = "";
            if (currentElo < 360) { avatar = "🐓"; nivel = getNivelRango(currentElo, 0, 360); }
            else if (currentElo < 810) { avatar = "🦙"; nivel = getNivelRango(currentElo, 360, 810); }
            else if (currentElo < 1400) { avatar = "🐑"; nivel = getNivelRango(currentElo, 810, 1400); }
            else if (currentElo < 2150) { avatar = "🐖"; nivel = getNivelRango(currentElo, 1400, 2150); }
            else if (currentElo < 3050) { avatar = "🐄"; nivel = getNivelRango(currentElo, 2150, 3050); }
            else if (currentElo < 3950) { avatar = "🐎"; nivel = getNivelRango(currentElo, 3050, 3950); }
            else if (currentElo < 5000) { avatar = "🐃"; nivel = getNivelRango(currentElo, 3950, 5000); }
            else { return "🐂"; }
            return `${avatar} ${nivel}`;
        }

        function actualizarPosicion() {
            if (!loggedUserId) return;
            
            fetch(`https://torobot-izu5.onrender.com/api/my-rank-position?userId=${loggedUserId}&category=${categoriaActual}&filter=${filtroActual}`)
            .then(res => res.json())
            .then(data => {
                if(data.success && data.position) {
                    document.getElementById('myRankAlert').style.display = 'block';
                    document.getElementById('myPositionNumber').innerText = data.position;
                }
            }).catch(e => console.log(e));
        }

        function cambiarFiltro(nuevoFiltro) {
            if (nuevoFiltro === 'amigos' && !loggedUserId) {
                alert("⚠️ Debes iniciar sesión para ver el ranking exclusivo de tus amigos.");
                window.location.href = 'login.html';
                return;
            }
            if (filtroActual === nuevoFiltro) return;
            filtroActual = nuevoFiltro; paginaActual = 1;
            document.getElementById('btnFilterGeneral').classList.toggle('active', filtroActual === 'general');
            document.getElementById('btnFilterAmigos').classList.toggle('active', filtroActual === 'amigos');
            
            actualizarPosicion();
            cargarRankings();
        }

        function cambiarCategoria(nuevaCat, btnElement) {
            if (categoriaActual === nuevaCat) return;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            categoriaActual = nuevaCat; paginaActual = 1;
            document.getElementById('colHeader1').innerText = encabezados[nuevaCat][0];
            document.getElementById('colHeader2').innerText = encabezados[nuevaCat][1];
            
            actualizarPosicion();
            cargarRankings();
        }

        function cambiarPagina(direccion) {
            const nuevaPagina = paginaActual + direccion;
            if (nuevaPagina >= 1 && nuevaPagina <= totalPaginas) {
                paginaActual = nuevaPagina;
                cargarRankings();
            }
        }

        function saltarAPagina() {
            const input = document.getElementById('pageInput');
            let nuevaPagina = parseInt(input.value);
            if (isNaN(nuevaPagina) || nuevaPagina < 1) nuevaPagina = 1;
            else if (nuevaPagina > totalPaginas) nuevaPagina = totalPaginas;
            input.value = nuevaPagina;
            if (nuevaPagina !== paginaActual) { paginaActual = nuevaPagina; cargarRankings(); }
        }

        async function buscarJugador() {
            const query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            const btn = document.querySelector('.search-container button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const res = await fetch(`https://torobot-izu5.onrender.com/api/find-player-rank?query=${encodeURIComponent(query)}&category=${categoriaActual}&filter=${filtroActual}&userId=${loggedUserId}`);
                const data = await res.json();

                if (data.success) {
                    paginaActual = data.page;
                    targetHighlightId = data.numericId; 
                    cargarRankings(); 
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert("Error conectando con el servidor");
            }
            btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarJugador();
        });

        function verPerfil(id) {
            document.getElementById('m_name').innerText = "Cargando...";
            document.getElementById('playerModal').style.display = 'flex';

            fetch(`https://torobot-izu5.onrender.com/get-player/${id}`)
            .then(res => res.json())
            .then(p => {
                document.getElementById('m_name').innerText = p.name;
                document.getElementById('m_id').innerText = `#${p.numericId}`;
                document.getElementById('m_avatar').src = p.discordId ? `https://robohash.org/${p.discordId}.png?set=set4&bgset=bg2` : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=111&color=FFD342&rounded=true&bold=true`;
                
                const part = p.partidos || 1;
                const ganados = p.ganados || 0;
                document.getElementById('m_pj').innerText = p.partidos || 0;
                document.getElementById('m_wr').innerText = p.partidos > 0 ? ((ganados/part)*100).toFixed(1) : 0;
                document.getElementById('m_g').innerText = p.golesAnotados || 0;
                document.getElementById('m_a').innerText = p.asistencias || 0;
                document.getElementById('m_d').innerText = p.intercepciones || 0;
                document.getElementById('m_at').innerText = p.atajadas || 0;
            });
        }
        function cerrarModal() { document.getElementById('playerModal').style.display = 'none'; }
        function cerrarModalClickFuera(e) { if(e.target.id === 'playerModal') cerrarModal(); }


        async function cargarRankings() {
            const tbody = document.getElementById('tablaBody');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const pageInput = document.getElementById('pageInput');
            
            tbody.innerHTML = `<tr><td colspan="5" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Buscando en la base de datos...</td></tr>`;
            btnPrev.disabled = true; btnNext.disabled = true; pageInput.disabled = true;

            try {
                const response = await fetch(`https://torobot-izu5.onrender.com/api/web-rankings?category=${categoriaActual}&page=${paginaActual}&filter=${filtroActual}&userId=${loggedUserId}`);
                const data = await response.json();

                if (!data.success) throw new Error("Error del servidor");

                totalPaginas = data.totalPages || 1;
                pageInput.value = data.currentPage;
                document.getElementById('totalPagesDisplay').innerText = totalPaginas;

                btnPrev.disabled = (paginaActual === 1);
                btnNext.disabled = (paginaActual === totalPaginas);
                pageInput.disabled = false;

                if (data.players.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="padding:30px; color:#bdc3c7;">No se encontraron resultados.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                let startRank = (paginaActual - 1) * 20 + 1;

                data.players.forEach((p, index) => {
                    const pos = startRank + index;
                    let posHtml = `<span class="rank-number">${pos}</span>`;
                    if (pos === 1) posHtml = `<span class="rank-number rank-1"><i class="fa-solid fa-medal"></i> 1</span>`;
                    else if (pos === 2) posHtml = `<span class="rank-number rank-2"><i class="fa-solid fa-medal"></i> 2</span>`;
                    else if (pos === 3) posHtml = `<span class="rank-number rank-3"><i class="fa-solid fa-medal"></i> 3</span>`;

                    let valorPrincipal = ''; let valorSecundario = '';
                    const partidos = p.partidos || 1;

                    if (categoriaActual === 'general') {
                        valorPrincipal = `<span class="rango-badge">${getPlayerRankString(p.elo)}</span>`;
                        valorSecundario = p.mvps || 0;
                    } else if (categoriaActual === 'goles') {
                        valorPrincipal = p.golesAnotados || 0;
                        valorSecundario = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'asistencias') {
                        valorPrincipal = p.asistencias || 0;
                        valorSecundario = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'defensas') {
                        valorPrincipal = p.intercepciones || 0;
                        valorSecundario = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'arqueros') {
                        valorPrincipal = p.atajadas || 0;
                        valorSecundario = (valorPrincipal / partidos).toFixed(2);
                    }

                    let highlightClass = p.numericId === targetHighlightId ? 'highlighted-row' : '';
                    let styleExtra = (!highlightClass && p.numericId == loggedUserId) ? "background: rgba(255, 211, 66, 0.1);" : "";

                    tbody.innerHTML += `
                        <tr class="${highlightClass}" style="${styleExtra}" onclick="verPerfil(${p.numericId})">
                            <td>${posHtml}</td>
                            <td class="player-name">${p.name} <span class="player-id">#${p.numericId}</span></td>
                            <td>${p.partidos}</td>
                            <td style="font-weight:bold;">${valorPrincipal}</td>
                            <td style="color:#bdc3c7; font-weight:bold;">${valorSecundario}</td>
                        </tr>
                    `;
                });

                targetHighlightId = null;

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:#cc2a2a; padding:30px;">❌ Error de conexión al cargar los rankings.</td></tr>`;
            }
        }
        actualizarPosicion();
        cargarRankings();
    </script>
</body>
</html>
