<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroMatch - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .seleccion-wrapper { width: 95%; max-width: 1200px; margin: 10vh auto 50px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .box { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; }
        .box h3 { margin-top: 0; color: #FFD342; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; text-align: center; font-size: 1.2rem;}
        
        .left-col { display: flex; flex-direction: column; gap: 20px; }
        .live-box { text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-color: #2df2c1; box-shadow: 0 0 15px rgba(45, 242, 193, 0.1); }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: #2df2c1; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;}
        .status-circle.green { width: 12px; height: 12px; background-color: #2df2c1; border-radius: 50%; box-shadow: 0 0 10px rgba(45, 242, 193, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .score-text { font-size: 2.2rem; font-weight: bold; color: white; letter-spacing: 2px; text-align: center;}

        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #7d7d7d; font-weight: bold; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid #FFD342; color: #FFD342; }
        .tab:hover:not(.active) { color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .match-list-container { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .match-list-container::-webkit-scrollbar { width: 6px; }
        .match-list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 5px; }
        .match-list-container::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        .match-list-container::-webkit-scrollbar-thumb:hover { background: #FFD342; }
        
        .match-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1.05rem; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 8px;}
        .match-teams { flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .match-date { width: 140px; text-align: center; color: #7d7d7d; font-size: 0.9rem; border-left: 1px solid #444; }
        .action-icons { width: 50px; display: flex; gap: 10px; justify-content: center; margin-left: 0; }

        .edit-btn { position: absolute; bottom: 20px; right: 20px; background: transparent; color: #2df2c1; border: 2px solid #2df2c1; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        .edit-btn:hover { background: #2df2c1; color: #111; }

        .right-col { display: flex; flex-direction: column; gap: 20px; }
        .list-box ul { list-style-type: none; padding: 0; margin: 0; }
        .list-box li { padding: 12px 0; border-bottom: 1px dashed #333; color: #bdc3c7; font-size: 0.95rem; }
        
        #listaJugadores { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        #listaJugadores::-webkit-scrollbar { width: 6px; }
        #listaJugadores::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 5px; }
        #listaJugadores::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        #listaJugadores::-webkit-scrollbar-thumb:hover { background: #FFD342; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 1px solid #FFD342; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; color: white; }
        .modal-content h3 { color: #FFD342; margin-top: 0; text-align: center; }
        .modal-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .modal-form input { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
        .modal-form input:focus { border-color: #FFD342; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; }
        .penalties-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px dashed #555;}
        .modal-btn { background: #2df2c1; color: #111; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .modal-btn.cancel { background: #cc2a2a; color: white; margin-top: 10px;}
        
        .delete-icon { color: #cc2a2a; cursor: pointer; }
        .delete-icon:hover { color: #ff4d4d; }
        .edit-action-icon { color: #3498db; cursor: pointer; }
        .edit-action-icon:hover { color: #5dade2; }

        @media (max-width: 900px) { .seleccion-wrapper { grid-template-columns: 1fr; } }
        
        @media (max-width: 600px) { 
            .score-text { font-size: 1.8rem; }
            .match-row { flex-direction: column; gap: 8px; padding: 15px; }
            .match-teams, .match-date, .action-icons { width: 100%; border-left: none; }
            .match-date { border-top: 1px dashed #444; padding-top: 8px; }
            .box { padding-bottom: 70px; } 
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <div class="seleccion-wrapper">
            <div class="left-col">
                <div class="box live-box">
                    <div id="liveIndicator" style="display: none;" class="live-indicator"><span class="status-circle green"></span> En vivo</div>
                    <div id="liveIndicatorOff" class="live-indicator" style="color: #7d7d7d;"><span class="status-circle" style="background:#cc2a2a;"></span> Offline</div>
                    <div class="score-text" id="liveScore">Esperando conexión...</div>
                </div>

                <div class="box" style="padding-bottom: 70px;">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('proximos')">Próximo express</div>
                        <div class="tab" onclick="switchTab('historial')">Historial</div>
                    </div>

                    <div id="proximos" class="tab-content active">
                        <div class="match-list-container" id="proximos-lista">
                            <p style="text-align:center; color:#7d7d7d;">Calculando fecha...</p>
                        </div>
                    </div>

                    <div id="historial" class="tab-content">
                        <div class="match-list-container" id="historial-lista">
                            <p style="text-align:center; color:#7d7d7d;">Cargando historial...</p>
                        </div>
                    </div>

                    <button id="btnEditar" class="edit-btn" onclick="abrirModalNuevo()"><i class="fa-solid fa-plus"></i> Añadir Resultado</button>
                </div>
            </div>

            <div class="right-col">
                <div class="box list-box" style="flex: 1;">
                    <h3>⚽ Jugadores</h3>
                    <ul id="listaJugadores"><li>Cargando plantel...</li></ul>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fa-solid fa-plus"></i> Añadir al Historial</h3>
            
            <div class="modal-form">
                <div class="form-row">
                    <input type="text" id="m_eq1" placeholder="Nombre Eq 1">
                    <input type="text" id="m_eq2" placeholder="Nombre Eq 2">
                </div>
                <div class="form-row">
                    <input type="number" id="m_goles1" placeholder="Goles Eq 1" oninput="checkPenales()">
                    <input type="number" id="m_goles2" placeholder="Goles Eq 2" oninput="checkPenales()">
                </div>
                
                <div class="penalties-section" id="penales_div" style="display: none;">
                    <p style="margin-top:0; margin-bottom: 10px; color:#FFD342; font-size: 0.9rem; text-align: center;">Tanda de Penales</p>
                    <div class="form-row">
                        <input type="number" id="m_pen1" placeholder="Penales Eq 1">
                        <input type="number" id="m_pen2" placeholder="Penales Eq 2">
                    </div>
                </div>

                <input type="date" id="m_date">
                
                <button class="modal-btn" id="modalSubmitBtn" onclick="guardarPartido()">Guardar Resultado</button>
                <button class="modal-btn cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function getNextSaturday() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const daysUntilSaturday = (6 - dayOfWeek + 7) % 7;
            let nextSat = new Date(now);
            if (daysUntilSaturday === 0 && now.getHours() >= 20) { nextSat.setDate(now.getDate() + 7); } 
            else { nextSat.setDate(now.getDate() + daysUntilSaturday); }
            const dd = String(nextSat.getDate()).padStart(2, '0');
            const mm = String(nextSat.getMonth() + 1).padStart(2, '0');
            return `${dd}/${mm}/${nextSat.getFullYear()} a las 20:30`;
        }

        const loggedId = localStorage.getItem('toroHaxLoggedId') || 'null';
        let isManager = false;
        let editingId = null;

        function iniciarCarga() {
            const ulJugadores = document.getElementById('listaJugadores');
            const histDiv = document.getElementById('historial-lista');
            const proxDiv = document.getElementById('proximos-lista');

            ulJugadores.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> Conectando al servidor...</li>';
            proxDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;"><i class="fa-solid fa-spinner fa-spin"></i> Despertando bot (puede tardar 50s)...</p>';
            histDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;"><i class="fa-solid fa-spinner fa-spin"></i> Despertando bot...</p>';

            fetch(`https://torobot-izu5.onrender.com/api/toromatch/data?numericId=${loggedId}`)
            .then(res => {
                if(!res.ok) throw new Error("Servidor no responde");
                return res.json();
            })
            .then(data => {
                if(data.success) {
                    if(data.canEdit) {
                        isManager = true;
                        document.getElementById('btnEditar').style.display = 'block';
                    }

                    ulJugadores.innerHTML = '';
                    let equipoA = data.equipoA || "Equipo 1";
                    let equipoB = data.equipoB || "Equipo 2";

                    if(data.jugadores.length > 0) {
                        const roles = [...new Set(data.jugadores.map(j => j.split(' - ')[0]))];
                        if(roles[0]) equipoA = roles[0];
                        if(roles[1]) equipoB = roles[1];
                        data.jugadores.forEach(jug => {
                            const partes = jug.split(' - ');
                            ulJugadores.innerHTML += `<li><span style="color:#5dc8e8; font-weight:bold;">${partes[0]}</span> - ${partes[1]}</li>`;
                        });
                    } else {
                        ulJugadores.innerHTML = '<li>No hay jugadores registrados.</li>';
                    }

                    proxDiv.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 30px 15px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-top: 15px;">
                            <div style="font-size: 1.5rem; color: #FFD342; font-weight: bold; text-align: center;">
                                ${equipoA} <span style="color:white; margin: 0 10px; font-size: 1.2rem;">vs</span> ${equipoB} 
                            </div>
                            <div style="color: #7d7d7d; font-size: 1.1rem; border-top: 1px dashed #444; padding-top: 15px; width: 80%; text-align: center;">
                                <i class="fa-regular fa-clock" style="margin-right: 5px;"></i> Sábado ${getNextSaturday()}
                            </div>
                        </div>
                    `;
                    
                    cargarHistorial();
                }
            })
            .catch(err => {
                ulJugadores.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> El bot está despertando. Reintentando...</li>';
                setTimeout(iniciarCarga, 5000);
            });
        }
        iniciarCarga();

        function cargarHistorial() {
            fetch('https://torobot-izu5.onrender.com/api/matches/toromatch')
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const histDiv = document.getElementById('historial-lista');
                    histDiv.innerHTML = '';

                    const formatFecha = (dateStr) => {
                        if(!dateStr) return '';
                        const parts = dateStr.split('-');
                        return `${parts[2]}/${parts[1]}/${parts[0]}`;
                    };

                    data.matches.forEach(m => {
                        if (m.isHistory) {
                            const acciones = isManager ? `
                            <div class="action-icons">
                                <i class="fa-solid fa-pen edit-action-icon" onclick="abrirModalEditar('${m._id}', '${m.matchType}', '${m.rival}', ${m.golesLocal}, ${m.golesVisita}, ${m.penalesLocal}, ${m.penalesVisita}, '${m.date}')"></i>
                                <i class="fa-solid fa-trash delete-icon" onclick="borrarPartido('${m._id}')"></i>
                            </div>` : '';
                            
                            let scoreText = `${m.golesLocal} - ${m.golesVisita}`;
                            if (m.penalesLocal > 0 || m.penalesVisita > 0) {
                                scoreText = `<span style="color:#7d7d7d; font-size:0.9rem;">(${m.penalesLocal})</span> ${scoreText} <span style="color:#7d7d7d; font-size:0.9rem;">(${m.penalesVisita})</span>`;
                            }

                            histDiv.innerHTML += `
                                <div class="match-row">
                                    <div class="match-teams">${m.matchType} ${scoreText} ${m.rival}</div>
                                    <div class="match-date">${formatFecha(m.date)}</div>
                                    ${acciones}
                                </div>
                            `;
                        }
                    });
                    if (histDiv.innerHTML === '') histDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;">El historial está vacío.</p>';
                }
            });
        }

        function checkPenales() {
            const g1 = document.getElementById('m_goles1').value;
            const g2 = document.getElementById('m_goles2').value;
            if (g1 !== "" && g2 !== "" && g1 === g2) {
                document.getElementById('penales_div').style.display = 'block';
            } else {
                document.getElementById('penales_div').style.display = 'none';
                document.getElementById('m_pen1').value = '';
                document.getElementById('m_pen2').value = '';
            }
        }

        function abrirModalNuevo() { 
            editingId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-plus"></i> Añadir Resultado';
            document.getElementById('modalSubmitBtn').innerText = 'Guardar Resultado';
            document.getElementById('m_eq1').value = '';
            document.getElementById('m_eq2').value = '';
            document.getElementById('m_goles1').value = '';
            document.getElementById('m_goles2').value = '';
            document.getElementById('m_pen1').value = '';
            document.getElementById('m_pen2').value = '';
            document.getElementById('m_date').value = '';
            checkPenales();
            document.getElementById('editModal').style.display = 'flex'; 
        }

        function abrirModalEditar(id, eq1, eq2, g1, g2, p1, p2, date) {
            editingId = id;
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen"></i> Editar Resultado';
            document.getElementById('modalSubmitBtn').innerText = 'Actualizar Resultado';
            document.getElementById('m_eq1').value = eq1;
            document.getElementById('m_eq2').value = eq2;
            document.getElementById('m_goles1').value = g1;
            document.getElementById('m_goles2').value = g2;
            document.getElementById('m_pen1').value = p1 || '';
            document.getElementById('m_pen2').value = p2 || '';
            document.getElementById('m_date').value = date;
            checkPenales();
            document.getElementById('editModal').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('editModal').style.display = 'none'; }

        async function guardarPartido() {
            const equipo1 = document.getElementById('m_eq1').value.trim();
            const equipo2 = document.getElementById('m_eq2').value.trim();
            const date = document.getElementById('m_date').value;
            const goles1 = parseInt(document.getElementById('m_goles1').value) || 0;
            const goles2 = parseInt(document.getElementById('m_goles2').value) || 0;
            const pen1 = parseInt(document.getElementById('m_pen1').value) || 0;
            const pen2 = parseInt(document.getElementById('m_pen2').value) || 0;

            if(!equipo1 || !equipo2 || !date) return alert("Debes llenar los nombres de los equipos y la fecha.");

            const url = editingId ? `https://torobot-izu5.onrender.com/api/matches/${editingId}` : 'https://torobot-izu5.onrender.com/api/matches';
            const method = editingId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        numericId: loggedId, team: 'toromatch',
                        isHistory: true, rival: equipo2, matchType: equipo1, 
                        golesLocal: goles1, golesVisita: goles2, 
                        penalesLocal: pen1, penalesVisita: pen2, date: date
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    cerrarModal();
                    cargarHistorial(); 
                } else {
                    alert("Error: No tienes permisos.");
                }
            } catch (err) { alert("Error de conexión."); }
        }

        async function borrarPartido(id) {
            if(!confirm("¿Seguro que quieres borrar este resultado?")) return;
            try {
                const res = await fetch(`https://torobot-izu5.onrender.com/api/matches/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numericId: loggedId, team: 'toromatch' })
                });
                const data = await res.json();
                if(data.success) cargarHistorial();
                else alert("Error al borrar.");
            } catch (err) { alert("Error de conexión."); }
        }

        function actualizarMarcador() {
            fetch('https://torobot-izu5.onrender.com/api/toromatch/live')
            .then(res => res.json())
            .then(data => {
                const indOn = document.getElementById('liveIndicator');
                const indOff = document.getElementById('liveIndicatorOff');
                const score = document.getElementById('liveScore');
                score.innerText = data.text;
                if (data.active) {
                    indOn.style.display = 'flex'; indOff.style.display = 'none';
                    document.querySelector('.live-box').style.borderColor = '#2df2c1';
                } else {
                    indOn.style.display = 'none'; indOff.style.display = 'flex';
                    document.querySelector('.live-box').style.borderColor = '#333';
                    score.innerText = "No hay partido en vivo"; 
                }
            });
        }
        actualizarMarcador();
        setInterval(actualizarMarcador, 5000);
    </script>
</body>
</html>
