<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroHax Oficial Site - Salas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .rooms-section { width: 90%; max-width: 1200px; margin: auto; margin-top: 10vh; text-align: center; margin-bottom: 50px; }
        .rooms-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 40px; }
        .rooms-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .room-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; text-align: left; position: relative; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; }
        .room-card:hover { transform: translateY(-5px); border-color: #FFD342; box-shadow: 0 10px 25px rgba(255, 211, 66, 0.2); }
        .room-status { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: #bdc3c7; }
        .status-circle { width: 10px; height: 10px; border-radius: 50%; }
        .status-circle.green { background-color: #2df2c1; box-shadow: 0 0 10px rgba(45, 242, 193, 0.5); }
        .status-circle.red { background-color: #cc2a2a; box-shadow: 0 0 10px rgba(204, 42, 42, 0.5); }
        .room-name { color: #FFD342; font-size: 1.1rem; font-weight: bold; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        .room-link-container { font-size: 0.8rem; color: #bdc3c7; margin-bottom: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .room-link-container span { color: #3498db; }
        .room-jugar-btn { width: 100%; background: rgba(255, 211, 66, 0.1); color: #FFD342; border: 1px solid #FFD342; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; text-decoration: none; cursor: pointer; transition: 0.3s; text-align: center; }
        .room-jugar-btn:hover { background: #FFD342; color: #111; transform: translateY(-2px); box-shadow: 0 0 15px rgba(255, 211, 66, 0.3); }
        .room-card.inactive { opacity: 0.6; }
        .room-card.inactive:hover { border-color: rgba(255, 255, 255, 0.1); box-shadow: none; transform: none; }
        .room-jugar-btn.offline { color: #cc2a2a; border-color: #cc2a2a; background: rgba(204, 42, 42, 0.05); pointer-events: none; }
        @media (max-width: 900px) { .rooms-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .rooms-title { font-size: 1.8rem; } .rooms-grid { grid-template-columns: 1fr; } .room-card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="close-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></div>
            <a href="#" onclick="if(localStorage.getItem('toroHaxLoggedId')){ window.location.href='perfil.html'; } else { window.location.href='login.html'; } return false;">
                <i class="fa-solid fa-user"></i> | Perfil
            </a>
            <a href="#" onclick="checkLogin('vip.html')">
                <i class="fa-solid fa-gem"></i> | VIP
            </a>
            <a href="#" onclick="checkLogin('tienda.html')">
                <i class="fa-solid fa-cart-shopping"></i> | Tienda
            </a>
            <a href="index.html">
                <i class="fa-solid fa-house"></i> | Menú principal
            </a>
        </div>
        <div class="sidebar-bottom">
            <a href="#" class="logout-btn" onclick="confirmarLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> | Cerrar sesión
            </a>
        </div>
    </nav>

    <header></header>

    <div class="logo-container">
        <img src="logo_torohax.png" alt="ToroHax Logo">
    </div>

    <main class="rooms-section">
        <h2 class="rooms-title">Salas de HaxBall en Vivo</h2>
        
        <div class="rooms-grid" id="salas-container">
            <p style="color: #FFD342;">⏳ Buscando salas...</p>
        </div>
    </main>

    <footer>
        <p>© 2026 ToroHax. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Lógica de menús y seguridad original
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => sidebar.classList.add('active'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));

        document.addEventListener('click', function(event) {
            if (sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                    sidebar.classList.remove('active');
                }
            }
        });

        function checkLogin(page) {
            if (localStorage.getItem('toroHaxLoggedId')) window.location.href = page; 
            else window.location.href = 'login.html'; 
        }

        function confirmarLogout() {
            if(confirm("⚠️ ¿Estás seguro que quieres cerrar sesión?")) {
                localStorage.removeItem('toroHaxLoggedId');
                window.location.href = 'index.html';
            }
        }

        // --- SISTEMA DINÁMICO DE SALAS ---
        async function cargarSalas() {
            try {
                const response = await fetch('https://torobot-izu5.onrender.com/api/active-rooms');
                const salas = await response.json();
                const container = document.getElementById('salas-container');
                container.innerHTML = ''; // Limpiamos el texto de "Buscando..."

                if (salas.length === 0) {
                    // Si no hay salas vivas, mostramos la tarjeta de Offline
                    container.innerHTML = `
                        <div class="room-card inactive">
                            <div class="room-status">
                                <span class="status-circle red"></span>
                            </div>
                            <h4 class="room-name">Mantenimiento [TH]</h4>
                            <p class="room-link-container">🌐 <span>Sala apagada actualmente</span></p>
                            <span class="room-jugar-btn offline">OFFLINE</span>
                        </div>
                    `;
                    return;
                }

                // Si hay salas, creamos una tarjeta verde por cada una
                salas.forEach(sala => {
                    const linkLimpio = sala.link ? sala.link.replace('https://', '') : 'Esperando link...';
                    
                    container.innerHTML += `
                        <div class="room-card">
                            <div class="room-status">
                                <span class="status-circle green"></span>
                                <span>${sala.players}/${sala.maxPlayers}</span>
                            </div>
                            <h4 class="room-name">${sala.name}</h4>
                            <p class="room-link-container">🌐 <span>${linkLimpio}</span></p>
                            <a href="${sala.link}" target="_blank" rel="noopener noreferrer" class="room-jugar-btn">JUGAR</a>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error cargando salas:", error);
                document.getElementById('salas-container').innerHTML = `<p style="color: #cc2a2a;">❌ Error al conectar con el servidor ToroBot.</p>`;
            }
        }

        // Cargar apenas se abre la página
        cargarSalas();
        
        // Refrescar automáticamente cada 10 segundos para ver si entra gente o se cae la sala
        setInterval(cargarSalas, 10000);
    </script>
</body>
</html>
