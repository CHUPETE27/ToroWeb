<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroHax Oficial Site</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        main { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 90%; 
            max-width: 1200px;
            margin: 10vh auto 50px; 
        }

        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr);
            gap: 25px; 
            width: 100%; 
            margin-bottom: 40px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
        }

        .card { 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; 
            padding: 30px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .card:hover { transform: translateY(-5px); border-color: #FFD342; box-shadow: 0 10px 25px rgba(255, 211, 66, 0.2); }
        .card-icon { font-size: 3.5rem; display: block; margin-bottom: 15px; }
        .card h3 { color: #FFD342; margin-bottom: 10px; text-transform: uppercase; font-size: 1.4rem; letter-spacing: 1px;}
        .card p { color: #bdc3c7; font-size: 1rem; margin: 0; }
        .social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; }

        @media (max-width: 950px) {
            .card-grid { 
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        @media (max-width: 600px) {
            .card-grid { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menu-toggle">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="close-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></div>
            <a href="#" onclick="if(localStorage.getItem('toroHaxLoggedId')){ window.location.href='perfil.html'; } else { window.location.href='login.html'; } return false;">
                <i class="fa-solid fa-user"></i> | Perfil
            </a>
            <a href="#" onclick="checkLogin('vip.html')">
                <i class="fa-solid fa-gem"></i> | VIP
            </a>
            <a href="#" onclick="checkLogin('tienda.html')">
                <i class="fa-solid fa-cart-shopping"></i> | Tienda
            </a>
            <a href="index.html">
                <i class="fa-solid fa-house"></i> | Menú principal
            </a>
        </div>
        <div class="sidebar-bottom">
            <a href="#" class="logout-btn" onclick="confirmarLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> | Cerrar sesión
            </a>
        </div>
    </nav>

    <header>
    </header>

    <div class="logo-container">
        <img src="logo_torohax.png" alt="ToroHax Logo">
    </div>

    <main>
        <div class="card-grid">
            
            <div class="card" onclick="window.location.href='salas.html'">
                <span class="card-icon">💻</span>
                <h3>Salas</h3>
                <p>Revisa nuestras salas.</p>
            </div>

            <div class="card" onclick="window.location.href='rankings.html'">
                <span class="card-icon">🏆</span>
                <h3>Rankings</h3>
                <p>Top de jugadores.</p>
            </div>

            <div class="card" onclick="window.location.href='seleccion.html'">
                <span class="card-icon">🛡️</span>
                <h3>Selección</h3>
                <p>Únete a nuestro equipo.</p>
            </div>

            <div class="card" onclick="window.location.href='toromatch.html'">
                <span class="card-icon">🏟️</span>
                <h3>ToroMatch</h3>
                <p>Partidos express semanales.</p>
            </div>

        </div>
        
        <div class="social-links">
            <a href="https://discord.gg/3kHXFtzXfn" target="_blank" rel="noopener noreferrer" class="social-btn discord">
                <i class="fa-brands fa-discord"></i> Discord
            </a>
            <a href="https://www.instagram.com/torohax/" target="_blank" rel="noopener noreferrer" class="social-btn instagram">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://www.youtube.com/@ToroHax" target="_blank" rel="noopener noreferrer" class="social-btn youtube">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
            <a href="https://www.tiktok.com/@jtconeltoro" target="_blank" rel="noopener noreferrer" class="social-btn tiktok">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </a>
        </div>
    </main>

    <footer>
        <p>© 2026 ToroHax. Todos los derechos reservados.</p>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });

        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menu-toggle');
            
            if (sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                    sidebar.classList.remove('active');
                }
            }
        });

        function checkLogin(page) {
            if (localStorage.getItem('toroHaxLoggedId')) { 
                window.location.href = page; 
            } else { 
                window.location.href = 'login.html'; 
            }
        }

        function confirmarLogout() {
            if(confirm("⚠️ ¿Estás seguro que quieres cerrar sesión?")) {
                localStorage.removeItem('toroHaxLoggedId');
                window.location.href = 'index.html';
            }
        }
    </script>

</body>
</html>
