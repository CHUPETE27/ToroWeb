<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroHax Oficial Site - Salas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { overflow-x: hidden; width: 100%; position: relative; overflow-y: auto; }

        .rooms-section { width: 90%; max-width: 1200px; margin: auto; margin-top: 10vh; text-align: center; margin-bottom: 50px; }
        .rooms-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 40px; }

        .rooms-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            max-width: 900px; 
            margin: 0 auto;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        
        .room-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; text-align: left; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; width: 100%; overflow: hidden;}
        .room-card:hover { transform: translateY(-5px); border-color: #FFD342; box-shadow: 0 10px 25px rgba(255, 211, 66, 0.2); }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }

        .room-name { 
            color: #FFD342; 
            font-size: 1.1rem;
            font-weight: bold; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            flex-grow: 1;
            
            min-width: 0; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-status { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.85rem; 
            color: #bdc3c7; 
            background: rgba(0,0,0,0.5); 
            padding: 6px 12px; 
            border-radius: 20px;
            flex-shrink: 0;
        }
        
        .status-circle { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;}
        .status-circle.green { background-color: #2df2c1; box-shadow: 0 0 10px rgba(45, 242, 193, 0.5); }
        .status-circle.red { background-color: #cc2a2a; box-shadow: 0 0 10px rgba(204, 42, 42, 0.5); }
        
        .room-link-container { 
            width: 100%;
            box-sizing: border-box;
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            gap: 10px;
        }
        .room-link-text { color: #3498db; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-grow: 1;}
        
        .copy-btn { background: transparent; border: none; color: #bdc3c7; cursor: pointer; font-size: 1.2rem; transition: 0.3s; padding: 0; flex-shrink: 0;}
        .copy-btn:hover { color: #FFD342; transform: scale(1.1); }

        .room-jugar-btn { width: 100%; background: rgba(255, 211, 66, 0.1); color: #FFD342; border: 1px solid #FFD342; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; text-decoration: none; cursor: pointer; transition: 0.3s; text-align: center; display: block; box-sizing: border-box;}
        .room-jugar-btn:hover { background: #FFD342; color: #111; transform: translateY(-2px); box-shadow: 0 0 15px rgba(255, 211, 66, 0.3); }
        
        .room-card.inactive { opacity: 0.6; }
        .room-card.inactive:hover { border-color: rgba(255, 255, 255, 0.1); box-shadow: none; transform: none; }
        .room-jugar-btn.offline { color: #cc2a2a; border-color: #cc2a2a; background: rgba(204, 42, 42, 0.05); pointer-events: none; }
        
        @media (max-width: 768px) { 
            .rooms-title { font-size: 1.6rem; margin-top: 20px;} 
            .rooms-grid { grid-template-columns: 1fr; gap: 15px;} 
            .room-card { padding: 15px; } 
        }
    </style>
</head>
<body>
    <header></header>

    <main class="rooms-section">
        <h2 class="rooms-title">Salas de HaxBall en Vivo</h2>
        
        <div class="rooms-grid" id="salas-container">
            <p style="color: #FFD342; grid-column: 1 / -1;">⏳ Buscando salas...</p>
        </div>
    </main>

    <footer>
        <p>© 2026 ToroHax. Todos los derechos reservados.</p>
    </footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        function copiarLink(link, btnElement) {
            navigator.clipboard.writeText(link).then(() => {
                const icon = btnElement.querySelector('i');
                icon.className = 'fa-solid fa-check';
                icon.style.color = '#2df2c1';
                
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    icon.style.color = '';
                }, 2000);
            }).catch(err => {
                console.error("Error al copiar: ", err);
            });
        }

        function construirTarjeta(sala, tituloCerrado) {
            if (sala) {
                const linkLimpio = sala.link ? sala.link.replace('https://', '') : 'Esperando link...';
                return `
                    <div class="room-card">
                        <div class="room-header">
                            <h4 class="room-name" title="${sala.name}">${sala.name}</h4>
                            <div class="room-status">
                                <span class="status-circle green"></span>
                                <span>${sala.players}/${sala.maxPlayers}</span>
                            </div>
                        </div>
                        <div class="room-link-container">
                            <span class="room-link-text">🌐 ${linkLimpio}</span>
                            <button class="copy-btn" onclick="copiarLink('${sala.link}', this)" title="Copiar enlace">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                        <a href="${sala.link}" target="_blank" rel="noopener noreferrer" class="room-jugar-btn">JUGAR</a>
                    </div>
                `;
            } else {
                return `
                    <div class="room-card inactive">
                        <div class="room-header">
                            <h4 class="room-name" style="color: #7d7d7d;" title="${tituloCerrado}">${tituloCerrado}</h4>
                            <div class="room-status">
                                <span class="status-circle red"></span>
                                <span>OFF</span>
                            </div>
                        </div>
                        <div class="room-link-container" style="justify-content: center;">
                            <span class="room-link-text" style="color:#7d7d7d;">Sala apagada actualmente</span>
                        </div>
                        <span class="room-jugar-btn offline">CERRADO</span>
                    </div>
                `;
            }
        }

        async function cargarSalas() {
            try {
                const response = await fetch('https://torobot-izu5.onrender.com/api/active-rooms');
                const salas = await response.json();
                
                let salaPrincipal = null;
                let salaSecundaria = null;

                salas.forEach(sala => {
                    if (sala.id === 'jt_principal' || sala.name.toLowerCase().includes('ᴊᴜᴇɢᴀɴ ᴛᴏᴅᴏs')) {
                        salaPrincipal = sala;
                    } else if (!salaSecundaria) {
                        salaSecundaria = sala;
                    }
                });

                const container = document.getElementById('salas-container');
                
                container.innerHTML = 
                    construirTarjeta(salaPrincipal, "¡Juegan Todos! (Cerrado)") + 
                    construirTarjeta(salaSecundaria, "Host 2 (Cerrado)");

            } catch (error) {
                console.error("Error cargando salas:", error);
                document.getElementById('salas-container').innerHTML = `<p style="color: #cc2a2a; text-align:center; grid-column: 1 / -1;">❌ Error al conectar con el servidor ToroBot.</p>`;
            }
        }

        cargarSalas();
        setInterval(cargarSalas, 10000);
    </script>
</body>
</html>
