<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .rankings-wrapper { width: 95%; max-width: 1000px; margin: 10vh auto 50px; text-align: center; }
        .rankings-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 20px; }
        .rankings-subtitle { color: #bdc3c7; font-size: 1rem; margin-bottom: 30px; }

        .tabs-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: rgba(0,0,0,0.5); color: #bdc3c7; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tab-btn:hover { background: rgba(255, 211, 66, 0.1); border-color: #FFD342; color: #FFD342; }
        .tab-btn.active { background: #FFD342; color: #111; border-color: #FFD342; box-shadow: 0 0 15px rgba(255, 211, 66, 0.4); }

        .table-container { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: center; }
        th { background: rgba(0,0,0,0.6); color: #FFD342; padding: 15px; font-size: 1.1rem; border-bottom: 2px solid #333; }
        td { padding: 15px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .rank-number { font-weight: bold; font-size: 1.2rem; color: #bdc3c7; }
        .rank-1 { color: #FFD700; font-size: 1.5rem; } /* Oro */
        .rank-2 { color: #C0C0C0; font-size: 1.4rem; } /* Plata */
        .rank-3 { color: #CD7F32; font-size: 1.3rem; } /* Bronce */

        .player-name { font-weight: bold; color: #2df2c1; text-align: left; }
        .player-id { color: #7d7d7d; font-size: 0.8rem; margin-left: 5px; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 30px; }
        .page-btn { background: #111; color: #FFD342; border: 1px solid #FFD342; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .page-btn:hover:not(:disabled) { background: #FFD342; color: #111; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; }
        .page-info { color: #bdc3c7; font-weight: bold; }

        .loading-text { color: #FFD342; padding: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="close-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></div>
            <a href="#" onclick="if(localStorage.getItem('toroHaxLoggedId')){ window.location.href='perfil.html'; } else { window.location.href='login.html'; } return false;"><i class="fa-solid fa-user"></i> | Perfil</a>
            <a href="#" onclick="checkLogin('vip.html')"><i class="fa-solid fa-gem"></i> | VIP</a>
            <a href="#" onclick="checkLogin('tienda.html')"><i class="fa-solid fa-cart-shopping"></i> | Tienda</a>
            <a href="index.html"><i class="fa-solid fa-house"></i> | Menú principal</a>
        </div>
        <div class="sidebar-bottom">
            <a href="#" class="logout-btn" onclick="confirmarLogout()"><i class="fa-solid fa-right-from-bracket"></i> | Cerrar sesión</a>
        </div>
    </nav>

    <header></header>

    <div class="logo-container">
        <img src="logo_torohax.png" alt="ToroHax Logo">
    </div>

    <main class="rankings-wrapper">
        <h2 class="rankings-title">Salón de la Fama</h2>
        <p class="rankings-subtitle">Top de jugadores con un mínimo de 10 partidos disputados.</p>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="cambiarCategoria('general', this)"><i class="fa-solid fa-trophy"></i> General</button>
            <button class="tab-btn" onclick="cambiarCategoria('goles', this)"><i class="fa-solid fa-futbol"></i> Goles</button>
            <button class="tab-btn" onclick="cambiarCategoria('asistencias', this)"><i class="fa-solid fa-handshake-angle"></i> Asistencias</button>
            <button class="tab-btn" onclick="cambiarCategoria('defensas', this)"><i class="fa-solid fa-shield-halved"></i> Defensas</button>
            <button class="tab-btn" onclick="cambiarCategoria('arqueros', this)"><i class="fa-solid fa-hands-holding-circle"></i> Arqueros</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="10%">#</th>
                        <th width="40%" style="text-align: left;">Jugador</th>
                        <th width="20%">Partidos</th>
                        <th width="15%" id="colHeader1">Elo</th>
                        <th width="15%" id="colHeader2">Promedio</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr><td colspan="5" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Cargando datos desde la cancha...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="btnPrev" onclick="cambiarPagina(-1)"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
            <span class="page-info">Página <span id="currentPageDisplay">1</span> de <span id="totalPagesDisplay">1</span></span>
            <button class="page-btn" id="btnNext" onclick="cambiarPagina(1)">Siguiente <i class="fa-solid fa-chevron-right"></i></button>
        </div>

    </main>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => sidebar.classList.add('active'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));
        document.addEventListener('click', function(event) {
            if (sidebar.classList.contains('active') && !sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                sidebar.classList.remove('active');
            }
        });
        function checkLogin(page) { if (localStorage.getItem('toroHaxLoggedId')) window.location.href = page; else window.location.href = 'login.html'; }
        function confirmarLogout() { if(confirm("⚠️ ¿Estás seguro que quieres cerrar sesión?")) { localStorage.removeItem('toroHaxLoggedId'); window.location.href = 'index.html'; } }

        let categoriaActual = 'general';
        let paginaActual = 1;
        let totalPaginas = 1;

        const encabezados = {
            'general': ['Elo', 'Pts / Partido'],
            'goles': ['Total Goles', 'Goles / Partido'],
            'asistencias': ['Asistencias', 'Asist. / Partido'],
            'defensas': ['Recuperaciones', 'Recup. / Partido'],
            'arqueros': ['Atajadas', 'Atajadas / Partido']
        };

        function cambiarCategoria(nuevaCat, btnElement) {
            if (categoriaActual === nuevaCat) return;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            categoriaActual = nuevaCat;
            paginaActual = 1;

            document.getElementById('colHeader1').innerText = encabezados[nuevaCat][0];
            document.getElementById('colHeader2').innerText = encabezados[nuevaCat][1];

            cargarRankings();
        }

        function cambiarPagina(direccion) {
            const nuevaPagina = paginaActual + direccion;
            if (nuevaPagina >= 1 && nuevaPagina <= totalPaginas) {
                paginaActual = nuevaPagina;
                cargarRankings();
            }
        }

        async function cargarRankings() {
            const tbody = document.getElementById('tablaBody');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            
            tbody.innerHTML = `<tr><td colspan="5" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</td></tr>`;
            btnPrev.disabled = true;
            btnNext.disabled = true;

            try {
                const response = await fetch(`https://torobot-izu5.onrender.com/api/web-rankings?category=${categoriaActual}&page=${paginaActual}`);
                const data = await response.json();

                if (!data.success) throw new Error("Error del servidor");

                totalPaginas = data.totalPages || 1;
                document.getElementById('currentPageDisplay').innerText = data.currentPage;
                document.getElementById('totalPagesDisplay').innerText = totalPaginas;

                btnPrev.disabled = (paginaActual === 1);
                btnNext.disabled = (paginaActual === totalPaginas);

                if (data.players.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="padding:30px; color:#bdc3c7;">Aún no hay suficientes jugadores con 10 partidos en esta categoría.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                let startRank = (paginaActual - 1) * 20 + 1;

                data.players.forEach((p, index) => {
                    const pos = startRank + index;
                    let posHtml = `<span class="rank-number">${pos}</span>`;
                    
                    if (pos === 1) posHtml = `<span class="rank-number rank-1"><i class="fa-solid fa-medal"></i> 1</span>`;
                    else if (pos === 2) posHtml = `<span class="rank-number rank-2"><i class="fa-solid fa-medal"></i> 2</span>`;
                    else if (pos === 3) posHtml = `<span class="rank-number rank-3"><i class="fa-solid fa-medal"></i> 3</span>`;

                    let valorPrincipal = 0;
                    let promedio = 0;
                    const partidos = p.partidos || 1;

                    if (categoriaActual === 'general') {
                        valorPrincipal = p.elo;
                        promedio = (p.puntajeTotal / partidos).toFixed(1);
                    } else if (categoriaActual === 'goles') {
                        valorPrincipal = p.golesAnotados || 0;
                        promedio = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'asistencias') {
                        valorPrincipal = p.asistencias || 0;
                        promedio = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'defensas') {
                        valorPrincipal = p.intercepciones || 0;
                        promedio = (valorPrincipal / partidos).toFixed(2);
                    } else if (categoriaActual === 'arqueros') {
                        valorPrincipal = p.atajadas || 0;
                        promedio = (valorPrincipal / partidos).toFixed(2);
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>${posHtml}</td>
                            <td class="player-name">${p.name} <span class="player-id">#${p.numericId}</span></td>
                            <td>${p.partidos}</td>
                            <td style="font-weight:bold;">${valorPrincipal}</td>
                            <td style="color:#bdc3c7;">${promedio}</td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("Error cargando tabla:", error);
                tbody.innerHTML = `<tr><td colspan="5" style="color:#cc2a2a; padding:30px;">❌ Error de conexión al cargar los rankings.</td></tr>`;
            }
        }
        cargarRankings();
    </script>
</body>
</html>
