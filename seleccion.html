<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selección - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { overflow-x: hidden; width: 100%; position: relative; overflow-y: auto; max-width: 100vw;}

        .seleccion-wrapper { width: 95%; max-width: 1200px; margin: 10vh auto 50px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .box { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; max-width: 100%; overflow: hidden;}
        .box h3 { margin-top: 0; color: #FFD342; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; text-align: center; font-size: 1.2rem;}
        
        .left-col { display: flex; flex-direction: column; gap: 20px; max-width: 100%;}
        .live-box { text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-color: #2df2c1; box-shadow: 0 0 15px rgba(45, 242, 193, 0.1); }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: #2df2c1; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;}
        .status-circle.green { width: 12px; height: 12px; background-color: #2df2c1; border-radius: 50%; box-shadow: 0 0 10px rgba(45, 242, 193, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .score-text { font-size: 2.5rem; font-weight: bold; color: white; letter-spacing: 2px; text-align: center;}

        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #7d7d7d; font-weight: bold; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid #FFD342; color: #FFD342; }
        .tab:hover:not(.active) { color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .match-list-container { max-height: 300px; overflow-y: auto; padding-right: 5px; overflow-x: hidden;}
        .match-list-container::-webkit-scrollbar { width: 6px; }
        .match-list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 5px; }
        .match-list-container::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        .match-list-container::-webkit-scrollbar-thumb:hover { background: #FFD342; }

        .match-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1.05rem; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 8px; width: 100%;}
        .match-result { width: 40px; text-align: center; font-weight: bold; flex-shrink: 0;}
        .match-result.w { color: #2df2c1; } 
        .match-result.d { color: #FFD342; } 
        .match-result.l { color: #cc2a2a; } 
        .match-teams { flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;}
        .match-type { width: 90px; text-align: center; font-size: 0.8rem; background: #333; padding: 4px; border-radius: 4px; color: white; flex-shrink: 0;}
        .match-date { width: 90px; text-align: center; color: #7d7d7d; font-size: 0.9rem; border-left: 1px solid #444; flex-shrink: 0;}
        .action-icons { width: 50px; display: flex; gap: 10px; justify-content: center; margin-left: 0; flex-shrink: 0;}

        .edit-btn { position: absolute; bottom: 20px; right: 20px; background: transparent; color: #2df2c1; border: 2px solid #2df2c1; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        .edit-btn:hover { background: #2df2c1; color: #111; }

        .right-col { display: flex; flex-direction: column; gap: 20px; max-width: 100%;}
        .logo-box { display: flex; justify-content: center; align-items: center; padding: 30px; }
        .logo-box img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #3498db; object-fit: cover; }
        .list-box ul { list-style-type: none; padding: 0; margin: 0; }
        .list-box li { padding: 10px 0; border-bottom: 1px dashed #333; color: #bdc3c7; word-break: break-word;}
        .list-box li::before { content: "• "; color: #FFD342; font-weight: bold; }
        
        #listaVitrina { max-height: 180px; overflow-y: auto; padding-right: 5px; }
        #listaJugadores { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        #listaVitrina::-webkit-scrollbar, #listaJugadores::-webkit-scrollbar { width: 6px; }
        #listaVitrina::-webkit-scrollbar-track, #listaJugadores::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 5px; }
        #listaVitrina::-webkit-scrollbar-thumb, #listaJugadores::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        #listaVitrina::-webkit-scrollbar-thumb:hover, #listaJugadores::-webkit-scrollbar-thumb:hover { background: #FFD342; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 1px solid #FFD342; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; color: white; }
        .modal-content h3 { color: #FFD342; margin-top: 0; text-align: center; }
        .modal-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .modal-form input, .modal-form select { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; outline: none; width: 100%;}
        .modal-form input:focus, .modal-form select:focus { border-color: #FFD342; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; }
        .modal-btn { background: #2df2c1; color: #111; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .modal-btn.cancel { background: #cc2a2a; color: white; margin-top: 10px;}
        
        .delete-icon { color: #cc2a2a; cursor: pointer; }
        .delete-icon:hover { color: #ff4d4d; }
        .edit-action-icon { color: #3498db; cursor: pointer; }
        .edit-action-icon:hover { color: #5dade2; }

        @media (max-width: 900px) { .seleccion-wrapper { grid-template-columns: 1fr; } }
        
        @media (max-width: 480px) { 
            .seleccion-wrapper { padding: 0 10px; width: 100%; margin-top: 3vh;}
            .score-text { font-size: 1.8rem; }
            .box { padding: 15px; padding-bottom: 60px; } 
            
            .match-row { flex-direction: column; gap: 8px; padding: 15px; align-items: center;}
            .match-teams { white-space: normal; word-break: break-word; width: 100%; font-size: 1.1rem;}
            .match-result, .match-type, .match-date, .action-icons { width: 100%; border-left: none; text-align: center; }
            
            .action-icons { flex-direction: row; justify-content: center; padding-top: 10px; border-top: 1px dashed #444;}
            .match-date { border-top: 1px dashed #444; padding-top: 8px; }
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <div class="seleccion-wrapper">
            <div class="left-col">
                <div class="box live-box">
                    <div id="liveIndicator" style="display: none;" class="live-indicator"><span class="status-circle green"></span> En vivo</div>
                    <div id="liveIndicatorOff" class="live-indicator" style="color: #7d7d7d;"><span class="status-circle" style="background:#cc2a2a;"></span> Offline</div>
                    <div class="score-text" id="liveScore">THX 0 - 0 VIS</div>
                </div>

                <div class="box" style="padding-bottom: 70px;">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('proximos')">Próximos partidos</div>
                        <div class="tab" onclick="switchTab('historial')">Historial</div>
                    </div>

                    <div id="proximos" class="tab-content active">
                        <div id="proximos-lista" class="match-list-container"><p style="text-align:center; color:#7d7d7d;">Cargando partidos...</p></div>
                    </div>

                    <div id="historial" class="tab-content">
                        <div id="historial-lista" class="match-list-container"><p style="text-align:center; color:#7d7d7d;">Cargando historial...</p></div>
                    </div>

                    <button id="btnEditar" class="edit-btn" onclick="abrirModalNuevo()"><i class="fa-solid fa-plus"></i> Añadir Partido</button>
                </div>
            </div>

            <div class="right-col">
                <div class="box logo-box">
                    <img src="path1.png" alt="Logo Selección">
                </div>
                <div class="box list-box">
                    <h3>🏆 Vitrina</h3>
                    <ul id="listaVitrina"><li>Cargando trofeos...</li></ul>
                </div>
                <div class="box list-box">
                    <h3>⚽ Jugadores</h3>
                    <ul id="listaJugadores"><li>Cargando plantilla...</li></ul>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fa-solid fa-plus"></i> Añadir Partido</h3>
            <div class="modal-form">
                <select id="m_target" onchange="toggleGoles()">
                    <option value="proximo">Añadir a: Próximos Partidos</option>
                    <option value="historial">Añadir a: Historial (Ya jugado)</option>
                </select>
                <input type="text" id="m_rival" placeholder="Nombre del Rival (Ej: Boca Juniors)">
                <div class="form-row" id="goles_inputs" style="display: none;">
                    <input type="number" id="m_golesT" placeholder="Goles THX">
                    <input type="number" id="m_golesR" placeholder="Goles Rival">
                </div>
                <select id="m_type">
                    <option value="Amistoso">Amistoso</option>
                    <option value="Liga">Liga</option>
                    <option value="Eliminatoria">Eliminatoria</option>
                </select>
                <input type="date" id="m_date">
                <button class="modal-btn" id="modalSubmitBtn" onclick="guardarPartido()">Guardar Partido</button>
                <button class="modal-btn cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        const loggedId = localStorage.getItem('toroHaxLoggedId') || 'null';
        let isManager = false;
        let editingId = null;

        function iniciarCarga() {
            const ulJugadores = document.getElementById('listaJugadores');
            const ulVitrina = document.getElementById('listaVitrina');
            const proxDiv = document.getElementById('proximos-lista');
            const histDiv = document.getElementById('historial-lista');

            ulJugadores.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> Conectando al servidor...</li>';
            ulVitrina.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> Conectando al servidor...</li>';
            proxDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;"><i class="fa-solid fa-spinner fa-spin"></i> Despertando bot (puede tardar 50s)...</p>';
            histDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;"><i class="fa-solid fa-spinner fa-spin"></i> Despertando bot...</p>';

            fetch(`https://torobot-izu5.onrender.com/api/seleccion/data?numericId=${loggedId}`)
            .then(res => {
                if(!res.ok) throw new Error("Servidor no responde");
                return res.json();
            })
            .then(data => {
                if(data.success) {
                    if(data.canEdit) {
                        isManager = true;
                        document.getElementById('btnEditar').style.display = 'block';
                    }
                    ulJugadores.innerHTML = '';
                    if(data.jugadores.length > 0) data.jugadores.forEach(jug => ulJugadores.innerHTML += `<li>${jug}</li>`);
                    else ulJugadores.innerHTML = '<li>No hay jugadores registrados.</li>';

                    ulVitrina.innerHTML = '';
                    if(data.trofeos.length > 0) data.trofeos.forEach(trofeo => ulVitrina.innerHTML += `<li>${trofeo}</li>`);
                    else ulVitrina.innerHTML = '<li>Vitrina en construcción.</li>';
                    cargarPartidos(); 
                }
            })
            .catch(err => {
                ulJugadores.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> El bot está despertando. Reintentando...</li>';
                setTimeout(iniciarCarga, 5000); 
            });
        }
        iniciarCarga();

        function cargarPartidos() {
            fetch('https://torobot-izu5.onrender.com/api/seleccion/live')
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const proxDiv = document.getElementById('proximos-lista');
                    const histDiv = document.getElementById('historial-lista');
                    proxDiv.innerHTML = ''; histDiv.innerHTML = '';

                    const hoy = new Date();
                    hoy.setHours(0, 0, 0, 0);

                    const formatFecha = (dateStr) => {
                        if(!dateStr) return '';
                        const parts = dateStr.split('-'); 
                        return `${parts[2]}/${parts[1]}/${parts[0]}`;
                    };

                    data.matches.forEach(m => {
                        const fechaPartido = new Date(m.date + 'T00:00:00');
                        
                        if (!m.isHistory && fechaPartido < hoy) {
                            if (isManager) {
                                fetch(`https://torobot-izu5.onrender.com/api/matches/${m._id}`, {
                                    method: 'DELETE',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ numericId: loggedId, team: 'seleccion' })
                                }).catch(()=>{});
                            }
                            return;
                        }

                        const acciones = isManager ? `
                            <div class="action-icons">
                                <i class="fa-solid fa-pen edit-action-icon" onclick="abrirModalEditar('${m._id}', ${m.isHistory}, '${m.rival}', ${m.golesLocal}, ${m.golesVisita}, '${m.matchType}', '${m.date}')"></i>
                                <i class="fa-solid fa-trash delete-icon" onclick="borrarPartido('${m._id}')"></i>
                            </div>` : '';
                        
                        if (m.isHistory) {
                            let resultClass = "d"; let resultText = "D";
                            if (m.golesLocal > m.golesVisita) { resultClass = "w"; resultText = "W"; }
                            else if (m.golesLocal < m.golesVisita) { resultClass = "l"; resultText = "L"; }

                            histDiv.innerHTML += `
                                <div class="match-row">
                                    <div class="match-result ${resultClass}">(${resultText})</div> 
                                    <div class="match-teams">ToroHax ${m.golesLocal} - ${m.golesVisita} ${m.rival}</div>
                                    <div class="match-type">${m.matchType}</div>
                                    <div class="match-date">${formatFecha(m.date)}</div>
                                    ${acciones}
                                </div>
                            `;
                        } else {
                            proxDiv.innerHTML += `
                                <div class="match-row">
                                    <div class="match-result" style="width: 0px; margin: 0;"></div> 
                                    <div class="match-teams">ToroHax vs ${m.rival}</div>
                                    <div class="match-type">${m.matchType}</div>
                                    <div class="match-date">${formatFecha(m.date)}</div>
                                    ${acciones}
                                </div>
                            `;
                        }
                    });

                    if (proxDiv.innerHTML === '') proxDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;">No hay partidos programados.</p>';
                    if (histDiv.innerHTML === '') histDiv.innerHTML = '<p style="text-align:center; color:#7d7d7d;">El historial está vacío.</p>';
                }
            });
        }

        function abrirModalNuevo() {
            editingId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-plus"></i> Añadir Partido';
            document.getElementById('modalSubmitBtn').innerText = 'Guardar Partido';
            document.getElementById('m_target').value = 'proximo';
            document.getElementById('m_rival').value = '';
            document.getElementById('m_golesT').value = '';
            document.getElementById('m_golesR').value = '';
            document.getElementById('m_type').value = 'Amistoso';
            document.getElementById('m_date').value = '';
            toggleGoles();
            document.getElementById('editModal').style.display = 'flex';
        }

        function abrirModalEditar(id, isHistory, rival, golesT, golesR, type, date) {
            editingId = id;
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen"></i> Editar Partido';
            document.getElementById('modalSubmitBtn').innerText = 'Actualizar Partido';
            document.getElementById('m_target').value = isHistory ? 'historial' : 'proximo';
            document.getElementById('m_rival').value = rival;
            document.getElementById('m_golesT').value = golesT;
            document.getElementById('m_golesR').value = golesR;
            document.getElementById('m_type').value = type;
            document.getElementById('m_date').value = date;
            toggleGoles();
            document.getElementById('editModal').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('editModal').style.display = 'none'; }
        function toggleGoles() {
            const esHistorial = document.getElementById('m_target').value === 'historial';
            document.getElementById('goles_inputs').style.display = esHistorial ? 'flex' : 'none';
        }

        async function guardarPartido() {
            const isHistory = document.getElementById('m_target').value === 'historial';
            const rival = document.getElementById('m_rival').value.trim();
            const matchType = document.getElementById('m_type').value;
            const date = document.getElementById('m_date').value;
            let golesLocal = 0, golesVisita = 0;

            if (isHistory) {
                golesLocal = parseInt(document.getElementById('m_golesT').value) || 0;
                golesVisita = parseInt(document.getElementById('m_golesR').value) || 0;
            }

            if(!rival || !date) return alert("Debes ingresar el nombre del rival y la fecha.");

            const url = editingId ? `https://torobot-izu5.onrender.com/api/matches/${editingId}` : 'https://torobot-izu5.onrender.com/api/matches';
            const method = editingId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        numericId: loggedId, team: 'seleccion',
                        isHistory, rival, golesLocal, golesVisita, matchType, date
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    cerrarModal();
                    cargarPartidos(); 
                } else {
                    alert("Error: No tienes permisos.");
                }
            } catch (err) { alert("Error de conexión."); }
        }

        async function borrarPartido(id) {
            if(!confirm("¿Seguro que quieres borrar este partido?")) return;
            try {
                const res = await fetch(`https://torobot-izu5.onrender.com/api/matches/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numericId: loggedId, team: 'seleccion' })
                });
                const data = await res.json();
                if(data.success) cargarPartidos();
                else alert("Error al borrar.");
            } catch (err) { alert("Error de conexión."); }
        }

        function actualizarMarcador() {
            fetch('https://torobot-izu5.onrender.com/api/seleccion/live')
            .then(res => res.json())
            .then(data => {
                const indOn = document.getElementById('liveIndicator');
                const indOff = document.getElementById('liveIndicatorOff');
                const score = document.getElementById('liveScore');
                score.innerText = data.text;
                if (data.active) {
                    indOn.style.display = 'flex'; indOff.style.display = 'none';
                    document.querySelector('.live-box').style.borderColor = '#2df2c1';
                } else {
                    indOn.style.display = 'none'; indOff.style.display = 'flex';
                    document.querySelector('.live-box').style.borderColor = '#333';
                    score.innerText = "THX  -  ???";
                }
            });
        }
        actualizarMarcador();
        setInterval(actualizarMarcador, 5000);
    </script>
</body>
</html>
