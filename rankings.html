<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rankings - ToroHax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { overflow-x: hidden; width: 100%; position: relative; overflow-y: auto; }

        main { display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 1000px; margin: 5vh auto 50px; text-align: center; }
        
        .rankings-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 30px; }
        
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .search-container input { flex-grow: 1; background: #111; color: white; border: 1px solid #555; padding: 12px; border-radius: 8px; outline: none; text-align: center; font-size: 1rem;}
        .search-container input:focus { border-color: #FFD342; }
        .search-container button { background: #FFD342; color: #111; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; flex-shrink: 0;}

        .filter-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; border: 1px solid #333; width: 100%; max-width: 600px;}
        .filter-btn { background: transparent; color: #bdc3c7; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1.05rem; }
        .filter-btn.active { background: #FFD342; color: #111; box-shadow: 0 0 15px rgba(104, 201, 163, 0.4); }

        .my-rank-alert { background: rgba(45, 242, 193, 0.1); color: #2df2c1; border: 1px solid #2df2c1; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; display: block; width: 100%; max-width: 600px; }

        .tabs-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 100%;}
        .tab-btn { background: rgba(0,0,0,0.5); color: #bdc3c7; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; flex-grow: 1; max-width: 180px;}
        .tab-btn.active { background: #FFD342; color: #111; border-color: #FFD342; box-shadow: 0 0 15px rgba(255, 211, 66, 0.4); }

        .table-container { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: center; }
        th { background: rgba(0,0,0,0.6); color: #FFD342; padding: 15px; font-size: 1.1rem; border-bottom: 2px solid #333; }
        td { padding: 15px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; cursor: pointer; }
        tr:hover td { background: rgba(255,211,66,0.1); }
        
        .highlighted-row { background: rgba(255, 211, 66, 0.2) !important; outline: 2px solid #FFD342; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: flex-start; backdrop-filter: blur(10px); overflow-y: auto; padding: 20px 0; }
        .modal-content { background: #141414; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 95%; max-width: 900px; color: white; position: relative; margin: auto; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: #7d7d7d; cursor: pointer; }
        
        .modal-header { text-align: center; border-bottom: 2px solid #FFD342; padding-bottom: 20px; margin-bottom: 20px; }
        .modal-name { color: #FFD342; font-size: 2rem; margin: 0; text-transform: uppercase; }
        .modal-discord { color: #5dc8e8; font-size: 1.1rem; margin-top: 5px; display: block; font-weight: bold; }
        
        .modal-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .modal-stat-box { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; padding: 15px; }
        .modal-stat-box h3 { margin: 0 0 10px; color: #FFD342; font-size: 1rem; border-bottom: 1px solid #222; padding-bottom: 5px; text-align: center; }
        .modal-stat-box ul { list-style: none; padding: 0; margin: 0; text-align: left; }
        .modal-stat-box li { font-size: 0.9rem; color: #ccc; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .modal-stat-box li strong { color: white; }

        .modal-charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .modal-chart-box { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; }
        .modal-chart-box h4 { color: #FFD342; margin: 0 0 10px; font-size: 1rem; }
        .modal-chart-box img { max-width: 100%; height: auto; }

        @media (max-width: 600px) {
            .modal-content { padding: 15px; }
            .modal-name { font-size: 1.5rem; }
            .modal-stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <h2 class="rankings-title">TOPS de ToroHax</h2>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por Nombre o ID Numérica...">
            <button onclick="buscarJugador()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" id="btnFilterGeneral" onclick="cambiarFiltro('general')"><i class="fa-solid fa-globe"></i> Global</button>
            <button class="filter-btn" id="btnFilterAmigos" onclick="cambiarFiltro('amigos')"><i class="fa-solid fa-user-group"></i> Amigos</button>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="cambiarCategoria('general', this)"><i class="fa-solid fa-trophy"></i> General</button>
            <button class="tab-btn" onclick="cambiarCategoria('goles', this)"><i class="fa-solid fa-futbol"></i> Goles</button>
            <button class="tab-btn" onclick="cambiarCategoria('asistencias', this)"><i class="fa-solid fa-handshake-angle"></i> Asistencias</button>
            <button class="tab-btn" onclick="cambiarCategoria('defensas', this)"><i class="fa-solid fa-shield-halved"></i> Defensas</button>
            <button class="tab-btn" onclick="cambiarCategoria('arqueros', this)"><i class="fa-solid fa-hands-holding-circle"></i> Arqueros</button>
        </div>

        <div id="myRankAlert" class="my-rank-alert">
            <i class="fa-solid fa-spinner fa-spin"></i> Cargando tu posición...
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="10%">#</th>
                        <th width="40%" style="text-align: left;">Jugador</th>
                        <th width="20%">Partidos</th>
                        <th width="15%" id="colHeader1">Rango</th>
                        <th width="15%" id="colHeader2">MVPs</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr><td colspan="5" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Cargando datos...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="btnPrev" onclick="cambiarPagina(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="page-info-box">
                <input type="number" id="pageInput" class="page-input" value="1" min="1" onchange="saltarAPagina()">
                <span style="color:#7d7d7d; margin-left:5px;">de <span id="totalPagesDisplay">1</span></span>
            </div>
            <button class="page-btn" id="btnNext" onclick="cambiarPagina(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <div class="modal-overlay" id="playerModal" onclick="cerrarModalClickFuera(event)">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="cerrarModal()"></i>
            
            <div class="modal-header">
                <h2 id="m_name" class="modal-name">Nombre</h2>
                <span id="m_discord" class="modal-discord">Discord: ...</span>
                <p id="m_id_rank" style="color:#7d7d7d; margin-top:10px;">ID: #0 | Rango: ...</p>
            </div>

            <div class="modal-stats-grid">
                <div class="modal-stat-box">
                    <h3>📊 Totales</h3>
                    <ul id="m_listTotales"></ul>
                </div>
                <div class="modal-stat-box">
                    <h3>⚽ Stats</h3>
                    <ul id="m_listEstadisticas"></ul>
                </div>
                <div class="modal-stat-box">
                    <h3>📈 Promedios</h3>
                    <ul id="m_listPromedios"></ul>
                </div>
            </div>

            <div class="modal-charts-grid" id="m_charts">
                <div class="modal-chart-box">
                    <h4>Atributos</h4>
                    <img id="m_chartRadar" src="">
                </div>
                <div class="modal-chart-box">
                    <h4>Estilo: <span id="m_position" style="color:white;">...</span></h4>
                    <img id="m_chartPie" src="">
                </div>
                <div class="modal-chart-box">
                    <h4>Historial</h4>
                    <img id="m_chartDoughnut" src="">
                </div>
            </div>
        </div>
    </div>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        let categoriaActual = 'general';
        let filtroActual = 'general';
        let paginaActual = 1;
        let totalPaginas = 1;
        let targetHighlightId = null; 
        const loggedUserId = localStorage.getItem('toroHaxLoggedId') || '';

        const rankThresholds = [
            { min: 0, max: 360, name: "🐓 Gallina" },
            { min: 360, max: 810, name: "🦙 Llama" },
            { min: 810, max: 1400, name: "🐑 Oveja" },
            { min: 1400, max: 2150, name: "🐖 Cerdo" },
            { min: 2150, max: 3050, name: "🐄 Vaca" },
            { min: 3050, max: 3950, name: "🐎 Caballo" },
            { min: 3950, max: 5000, name: "🐃 Búfalo" },
            { min: 5000, max: 99999, name: "🐂 Toro" }
        ];

        function getPlayerRankString(elo) {
            const currentElo = elo || 200;
            for (let rank of rankThresholds) {
                if (currentElo >= rank.min && currentElo < rank.max) return rank.name;
            }
            return "🐂 Toro";
        }

        function actualizarPosicion() {
            const alertBox = document.getElementById('myRankAlert');
            if (!loggedUserId) { alertBox.innerHTML = '⚠️ Inicia sesión para ver tu posición'; return; }

            alertBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Calculando posición...';
            
            fetch(`https://torobot-izu5.onrender.com/api/my-rank-position?userId=${loggedUserId}&category=${categoriaActual}&filter=${filtroActual}`)
            .then(res => res.json())
            .then(data => {
                const pos = data.position || "No clasificado";
                alertBox.innerHTML = `<i class="fa-solid fa-ranking-star"></i> Tu puesto en este TOP: <span>${pos}</span>`;
            }).catch(() => alertBox.innerHTML = `❌ Error de conexión`);
        }

        async function verPerfil(id) {
            document.getElementById('playerModal').style.display = 'flex';
            document.getElementById('m_name').innerText = "Cargando...";

            try {
                const res = await fetch(`https://torobot-izu5.onrender.com/get-player/${id}`);
                const p = await res.json();

                document.getElementById('m_name').innerText = p.name;
                document.getElementById('m_discord').innerText = p.discordName ? `Discord: ${p.discordName}` : "Sin Discord vinculado";
                document.getElementById('m_id_rank').innerText = `ID: #${p.numericId} | Rango: ${getPlayerRankString(p.elo)}`;

                const part = p.partidos || 0;
                const gan = p.ganados || 0;
                const per = p.perdidos || 0;
                const mvp = p.mvps || 0;
                const wr = part > 0 ? ((gan/part)*100).toFixed(1) : 0;

                document.getElementById('m_listTotales').innerHTML = `
                    <li>Partidos: <strong>${part}</strong></li>
                    <li>Victorias: <strong>${gan}</strong></li>
                    <li>Derrotas: <strong>${per}</strong></li>
                    <li>WinRate: <strong>${wr}%</strong></li>
                    <li>MVPs: <strong>${mvp}</strong></li>
                `;

                document.getElementById('m_listEstadisticas').innerHTML = `
                    <li>Goles: <strong>${p.golesAnotados || 0}</strong></li>
                    <li>Asist: <strong>${p.asistencias || 0}</strong></li>
                    <li>Recup: <strong>${p.intercepciones || 0}</strong></li>
                    <li>Atajadas: <strong>${p.atajadas || 0}</strong></li>
                `;

                const pg = part > 0 ? (p.golesAnotados/part).toFixed(2) : 0;
                const pa = part > 0 ? (p.asistencias/part).toFixed(2) : 0;
                const pd = part > 0 ? (p.intercepciones/part).toFixed(2) : 0;
                const pat = part > 0 ? (p.atajadas/part).toFixed(2) : 0;

                document.getElementById('m_listPromedios').innerHTML = `
                    <li>Goles p/p: <strong>${pg}</strong></li>
                    <li>Asist p/p: <strong>${pa}</strong></li>
                    <li>Recup p/p: <strong>${pd}</strong></li>
                    <li>Atajadas p/p: <strong>${pat}</strong></li>
                `;

                if (part > 0) {
                    generarGraficos(p, pg, pa, pd, pat, gan, per, mvp);
                } else {
                    document.getElementById('m_charts').style.display = 'none';
                }

            } catch (e) { console.error(e); }
        }

        function generarGraficos(p, pg, pa, pd, pat, gan, per, mvp) {
            document.getElementById('m_charts').style.display = 'grid';
            
            const doughnut = { type: 'doughnut', data: { labels: ['V', 'D', 'M'], datasets: [{ data: [gan, per, mvp], backgroundColor: ['#10af10', '#8b1515', '#D3A778'] }] }, options: { legend: { display: false } } };
            document.getElementById('m_chartDoughnut').src = `https://quickchart.io/chart?w=200&h=200&c=${encodeURIComponent(JSON.stringify(doughnut))}&bkg=transparent`;

            const valTotal = (pg*12) + (pa*10) + (pat*8) + (pd*1);
            const pie = { type: 'pie', data: { labels: ['G', 'A', 'At', 'R'], datasets: [{ data: [pg, pa, pat, pd], backgroundColor: ['#8b1515', '#10af10', '#611161', '#2222a7'] }] }, options: { legend: { display: false } } };
            document.getElementById('m_chartPie').src = `https://quickchart.io/chart?w=200&h=200&c=${encodeURIComponent(JSON.stringify(pie))}&bkg=transparent`;
            
            const radar = { type: 'radar', data: { labels: ['Atq', 'Cre', 'Def', 'Por', 'Uti'], datasets: [{ data: [pg*5, pa*5, pd*5, pat*2, 50], backgroundColor: 'rgba(45,242,193,0.5)', borderColor: '#2df2c1' }] }, options: { legend: { display: false }, scale: { ticks: { display: false, max: 100 } } } };
            document.getElementById('m_chartRadar').src = `https://quickchart.io/chart?w=200&h=200&c=${encodeURIComponent(JSON.stringify(radar))}&bkg=transparent`;
        }

        async function cargarRankings() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = `<tr><td colspan="5" class="loading-text">Cargando...</td></tr>`;

            try {
                const response = await fetch(`https://torobot-izu5.onrender.com/api/web-rankings?category=${categoriaActual}&page=${paginaActual}&filter=${filtroActual}&userId=${loggedUserId}`);
                const data = await response.json();
                
                totalPaginas = data.totalPages || 1;
                document.getElementById('totalPagesDisplay').innerText = totalPaginas;
                document.getElementById('pageInput').value = paginaActual;

                tbody.innerHTML = '';
                let startRank = (paginaActual - 1) * 20 + 1;

                data.players.forEach((p, index) => {
                    const pos = startRank + index;
                    let posHtml = `<span class="rank-number">${pos}</span>`;
                    
                    if (pos === 1) posHtml = `<span class="rank-number rank-1"><i class="fa-solid fa-medal"></i> 1</span>`;
                    else if (pos === 2) posHtml = `<span class="rank-number rank-2"><i class="fa-solid fa-medal"></i> 2</span>`;
                    else if (pos === 3) posHtml = `<span class="rank-number rank-3"><i class="fa-solid fa-medal"></i> 3</span>`;

                    let valor1 = '', valor2 = '';
                    const part = p.partidos || 1;

                    if (categoriaActual === 'general') { valor1 = getPlayerRankString(p.elo); valor2 = p.mvps || 0; }
                    else if (categoriaActual === 'goles') { valor1 = p.golesAnotados; valor2 = (p.golesAnotados/part).toFixed(2); }
                    else if (categoriaActual === 'asistencias') { valor1 = p.asistencias; valor2 = (p.asistencias/part).toFixed(2); }
                    else if (categoriaActual === 'defensas') { valor1 = p.intercepciones; valor2 = (p.intercepciones/part).toFixed(2); }
                    else if (categoriaActual === 'arqueros') { valor1 = p.atajadas; valor2 = (p.atajadas/part).toFixed(2); }

                    let highlight = (p.numericId === targetHighlightId) ? 'highlighted-row' : '';
                    let esYo = (p.numericId == loggedUserId) ? 'border-left: 4px solid #FFD342;' : '';

                    tbody.innerHTML += `
                        <tr class="${highlight}" style="${esYo}" onclick="verPerfil(${p.numericId})">
                            <td>${posHtml}</td>
                            <td class="player-name">${p.name} <span class="player-id">#${p.numericId}</span></td>
                            <td>${p.partidos}</td>
                            <td style="font-weight:bold;">${valor1}</td>
                            <td style="color:#bdc3c7;">${valor2}</td>
                        </tr>
                    `;
                });
                targetHighlightId = null;
            } catch (e) { console.error(e); }
        }

        function cambiarFiltro(f) { 
            filtroActual = f; paginaActual = 1; 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            actualizarPosicion(); cargarRankings(); 
        }
        function cambiarCategoria(c, btn) { 
            categoriaActual = c; paginaActual = 1; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            actualizarPosicion(); cargarRankings(); 
        }
        function cambiarPagina(d) { if (paginaActual + d > 0 && paginaActual + d <= totalPaginas) { paginaActual += d; cargarRankings(); } }
        function saltarAPagina() { let p = parseInt(document.getElementById('pageInput').value); if (p > 0 && p <= totalPaginas) { paginaActual = p; cargarRankings(); } }
        function cerrarModal() { document.getElementById('playerModal').style.display = 'none'; }
        function cerrarModalClickFuera(e) { if(e.target.id === 'playerModal') cerrarModal(); }

        actualizarPosicion();
        cargarRankings();
    </script>
</body>
</html>
