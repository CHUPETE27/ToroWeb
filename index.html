<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroHax Oficial Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="menu-toggle" id="menu-toggle">
        ☰
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="close-btn" id="close-btn">✖</div>
            <a href="#">👤 Perfil</a>
            <a href="#">💎 VIP</a>
            <a href="#">🛒 Tienda</a>
            <a href="#">🏠 Menú principal</a>
        </div>
        <div class="sidebar-bottom">
            <a href="#" class="logout-btn">🚪 Cerrar sesión</a>
        </div>
    </nav>
    
    <header>
    </header>

    <div class="logo-container">
        <img src="logo_torohax.png" alt="ToroHax Logo">
    </div>

    <main>
        <div class="card-grid">
            
            <div class="card">
                <span class="card-icon">💻</span>
                <h3>Hosts</h3>
                <p>Revisa nuestras salas.</p>
            </div>

            <div class="card">
                <span class="card-icon">🛡️</span>
                <h3>Selección</h3>
                <p>Únete a nuestro equipo.</p>
            </div>

            <div class="card">
                <span class="card-icon">🏟️</span>
                <h3>ToroMatch</h3>
                <p>Partidos express semanales.</p>
            </div>

        </div>
        
        <div class="social-links">
            <a href="#" class="social-btn discord">🔵 Discord</a>
            <a href="#" class="social-btn instagram">🟠 Instagram</a>
            <a href="#" class="social-btn youtube">🔴 YouTube</a>
            <a href="#" class="social-btn tiktok">🟣 TikTok</a>
        </div>
    </main>

    <footer>
        <p>© 2026 ToroHax. Todos los derechos reservados.</p>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');

        // Al hacer clic en las 3 barras, le añade la clase 'active' para que aparezca
        menuToggle.addEventListener('click', () => {
            sidebar.classList.add('active');
        });

        // Al hacer clic en la X, le quita la clase 'active' para que se oculte
        closeBtn.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });
    </script>

</body>
</html>
