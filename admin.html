<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Admin - ToroHax</title>
    <link rel="icon" type="image/png" href="logo_torohax.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { overflow-x: hidden; width: 100%; position: relative; overflow-y: auto; max-width: 100vw; background-color: #0a0a0a; color: white;}

        .admin-wrapper { width: 95%; max-width: 800px; margin: 10vh auto 50px; display: flex; flex-direction: column; gap: 20px; }
        
        .box { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; max-width: 100%; overflow: hidden;}
        .box h3 { margin-top: 0; color: #FFD342; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; text-align: center; font-size: 1.2rem;}

        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #7d7d7d; font-weight: bold; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid #FFD342; color: #FFD342; }
        .tab:hover:not(.active) { color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #bdc3c7; font-size: 0.9rem; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.3s; font-family: inherit;}
        .form-group input:focus, .form-group select:focus { border-color: #FFD342; box-shadow: 0 0 8px rgba(255, 211, 66, 0.2); }
        .form-group input:disabled { background: #222; border-color: #333; color: #555; cursor: not-allowed; }

        .checkbox-container { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #e74c3c; font-weight: bold; padding: 12px; background: rgba(231, 76, 60, 0.1); border-radius: 8px; border: 1px solid #e74c3c;}
        .checkbox-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #e74c3c; margin: 0;}

        .btn-estandar { 
            width: 100%;
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 1.05rem; 
            border: none; 
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-estandar:disabled { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; }

        .btn-ban { background: #cc2a2a; color: white; }
        .btn-ban:hover:not(:disabled) { background: #e74c3c; box-shadow: 0 0 15px rgba(204, 42, 42, 0.4); }

        .btn-unban { background: #2df2c1; color: #111; }
        .btn-unban:hover:not(:disabled) { background: #40ffce; box-shadow: 0 0 15px rgba(45, 242, 193, 0.4); }

        .admin-header { text-align: center; margin-bottom: 10px; }
        .admin-header i { font-size: 3rem; color: #FFD342; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 211, 66, 0.3); }

        .loader-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#FFD342; }

        @media (max-width: 480px) {
            .admin-wrapper { padding: 0 15px; margin-top: 5vh; }
            .box { padding: 15px; }
            .duration-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header></header>

    <div id="loader" class="loader-screen">
        <i class="fa-solid fa-shield-halved fa-beat-fade fa-3x" style="margin-bottom: 15px;"></i>
        <h2>Verificando credenciales...</h2>
    </div>

    <main id="main-content" style="display: none;">
        <div class="admin-wrapper">
            <div class="admin-header">
                <i class="fa-solid fa-shield-halved"></i>
                <h1 style="margin: 0; color: white;">Panel de Control</h1>
            </div>

            <div class="box">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('global')"><i class="fa-solid fa-globe fa-fw"></i> Global</div>
                    <div class="tab" onclick="switchTab('sala')"><i class="fa-solid fa-server fa-fw"></i> Sala</div>
                </div>

                <div id="global" class="tab-content active">
                    
                    <div style="background: rgba(204, 42, 42, 0.05); border: 1px dashed #cc2a2a; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h4 style="color: #e74c3c; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;"><i class="fa-solid fa-gavel"></i> Banear</h4>
                        
                        <div class="form-group">
                            <label>ID del host</label>
                            <input type="number" id="banId" placeholder="Ej: 150">
                        </div>
                        
                        <div class="form-group">
                            <label>Duración</label>
                            <div class="duration-row" style="display: flex; gap: 10px; align-items: center;">
                                <input type="number" id="banDias" placeholder="N° de días (1-30)" min="1" max="30" style="flex: 1;">
                                <label class="checkbox-container">
                                    <input type="checkbox" id="banPermanente" onchange="toggleBanDuration()"> Permanente
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Motivo del baneo</label>
                            <input type="text" id="banRazon" placeholder="Ej: Uso de hacks, toxicidad...">
                        </div>

                        <button class="btn-estandar btn-ban" id="btnSubmitBan" onclick="ejecutarBaneo()">
                            <i class="fa-solid fa-hammer"></i> Banear Jugador
                        </button>
                    </div>

                    <div style="background: rgba(45, 242, 193, 0.05); border: 1px dashed #2df2c1; padding: 20px; border-radius: 10px;">
                        <h4 style="color: #2df2c1; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;"><i class="fa-solid fa-unlock"></i> Retirar Baneo (Unban)</h4>
                        
                        <div class="form-group">
                            <label>ID del host</label>
                            <input type="number" id="unbanId" placeholder="Ej: 150">
                        </div>

                        <button class="btn-estandar btn-unban" id="btnSubmitUnban" onclick="ejecutarDesbaneo()">
                            <i class="fa-solid fa-circle-check"></i> Desbanear Jugador
                        </button>
                    </div>

                </div>

                <div id="sala" class="tab-content">
                    <div style="text-align: center; padding: 40px 20px; color: #7d7d7d;">
                        <i class="fa-solid fa-person-digging fa-3x" style="margin-bottom: 15px; color: #555;"></i>
                        <h3>Herramientas de Sala</h3>
                        <p>Las funciones de host (kick, mute, cambiar mapas) estarán disponibles pronto.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer><p>© 2026 ToroHax. Todos los derechos reservados.</p></footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        const loggedId = localStorage.getItem('toroHaxLoggedId');
        let adminData = null;

        if (!loggedId) {
            window.location.href = 'login.html';
        } else {
            fetch(`https://torobot-izu5.onrender.com/get-player/${loggedId}`)
            .then(res => res.json())
            .then(data => {
                if (data && data.isAdmin === true) {
                    adminData = data;
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                } else {
                    alert("⚠️ Acceso denegado. Esta área está restringida.");
                    window.location.href = 'index.html';
                }
            })
            .catch(err => {
                alert("Error de conexión al verificar permisos.");
                window.location.href = 'index.html';
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function toggleBanDuration() {
            const isPermanent = document.getElementById('banPermanente').checked;
            const banDiasInput = document.getElementById('banDias');
            if (isPermanent) {
                banDiasInput.disabled = true;
                banDiasInput.value = "";
            } else {
                banDiasInput.disabled = false;
            }
        }

        async function sendToListaNegra(embed) {
            try {
                await fetch('https://torobot-izu5.onrender.com/api/webhook/lista-negra', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
            } catch (error) { console.error("Error enviando webhook seguro:", error); }
        }

        async function ejecutarBaneo() {
            const targetId = document.getElementById('banId').value;
            const isPermanent = document.getElementById('banPermanente').checked;
            const banDias = document.getElementById('banDias').value;
            let reason = document.getElementById('banRazon').value.trim();

            if (!targetId || targetId <= 0) return alert("❌ Debes ingresar una ID válida.");
            if (targetId === "1") return alert("❌ ¡Estás loco! No puedes banear al Creador.");
            
            let finalDays = 0;
            if (!isPermanent) {
                finalDays = parseInt(banDias);
                if (isNaN(finalDays) || finalDays < 1 || finalDays > 30) {
                    return alert("❌ Debes ingresar una cantidad válida de días (entre 1 y 30) o marcar 'Permanente'.");
                }
            }

            if (!reason) reason = "Sin motivo especificado";

            if(!confirm(`¿Seguro que deseas banear la ID #${targetId}?`)) return;

            const btn = document.getElementById('btnSubmitBan');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            try {
                const playerRes = await fetch(`https://torobot-izu5.onrender.com/get-player/${targetId}`);
                const targetData = await playerRes.json();
                
                if (!targetData || !targetData.numericId) {
                    alert("❌ La ID ingresada no existe en la base de datos.");
                    btn.innerHTML = '<i class="fa-solid fa-hammer"></i> Banear Jugador';
                    btn.disabled = false;
                    return;
                }

                if (targetData.isAdmin) {
                    alert("❌ No puedes banear a otro Administrador.");
                    btn.innerHTML = '<i class="fa-solid fa-hammer"></i> Banear Jugador';
                    btn.disabled = false;
                    return;
                }

                let banUntil = null;
                let durationText = "PERMANENTE";
                if (!isPermanent) {
                    banUntil = Date.now() + (finalDays * 24 * 60 * 60 * 1000);
                    durationText = `${finalDays} días`;
                }

                const banRes = await fetch(`https://torobot-izu5.onrender.com/ban-add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        numericId: targetData.numericId,
                        auth: targetData.auth,
                        ip: targetData.ip || targetData.lastKnownIP,
                        name: targetData.name,
                        reason: reason,
                        admin: adminData.name,
                        until: banUntil
                    })
                });

                if (banRes.ok) {
                    alert(`✅ ¡El jugador ${targetData.name} (ID: ${targetData.numericId}) ha sido baneado!`);

                    const embed = {
                        title: "🔨 BANEO WEB",
                        color: 0xFF0000,
                        description: `**Jugador:** ${targetData.name}\n**ID:** #${targetData.numericId}`,
                        fields: [
                            { name: "👮 Admin", value: `${adminData.name} (ID: #${adminData.numericId})`, inline: true },
                            { name: "⏰ Duración", value: durationText, inline: true },
                            { name: "📝 Razón", value: reason.length > 50 ? reason.substring(0, 50) + "..." : reason, inline: false },
                            { name: "🕐 Fecha", value: new Date().toLocaleString("es-CL"), inline: true }
                        ]
                    };
                    await sendToListaNegra(embed);

                    document.getElementById('banId').value = "";
                    document.getElementById('banDias').value = "";
                    document.getElementById('banPermanente').checked = false;
                    document.getElementById('banDias').disabled = false;
                    document.getElementById('banRazon').value = "";
                } else if (banRes.status === 409) {
                    alert("⚠️ Este jugador ya tiene un baneo activo.");
                } else {
                    alert("❌ Ocurrió un error en el servidor.");
                }

            } catch (err) { alert("❌ Error de red o servidor caído."); }

            btn.innerHTML = '<i class="fa-solid fa-hammer"></i> Banear Jugador';
            btn.disabled = false;
        }

        async function ejecutarDesbaneo() {
            const targetId = document.getElementById('unbanId').value;
            if (!targetId || targetId <= 0) return alert("❌ Debes ingresar una ID válida.");

            if(!confirm(`¿Seguro que deseas retirar el ban de la ID #${targetId}?`)) return;

            const btn = document.getElementById('btnSubmitUnban');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            try {
                const response = await fetch(`https://torobot-izu5.onrender.com/ban-remove`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ numericId: parseInt(targetId) })
                });

                if (response.ok) {
                    const data = await response.json();
                    const unbannedName = data.name || `ID #${targetId}`;
                    
                    alert(`✅ ¡Se retiró el ban de ${unbannedName} correctamente!`);

                    const embed = {
                        title: "✅ DESBANEO WEB",
                        color: 0x00FF00,
                        description: `**Jugador:** ${unbannedName}\n**ID:** #${targetId}`,
                        fields: [
                            { name: "👮 Admin", value: `${adminData.name} (ID: #${adminData.numericId})`, inline: true },
                            { name: "🕐 Fecha Desbaneo", value: new Date().toLocaleString("es-CL"), inline: true }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: { text: "ToroHax - Sistema de Moderación Web" }
                    };
                    await sendToListaNegra(embed);

                    document.getElementById('unbanId').value = "";
                } else {
                    alert("❌ No se encontró ningún baneo activo para esta ID.");
                }
            } catch (err) { alert("❌ Error de red o servidor caído."); }

            btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Desbanear Jugador';
            btn.disabled = false;
        }
    </script>
</body>
</html>
