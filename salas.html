<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToroHax Oficial Site - Salas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .rooms-section { width: 90%; max-width: 1200px; margin: auto; margin-top: 10vh; text-align: center; margin-bottom: 50px; }
        .rooms-title { color: #FFD342; text-transform: uppercase; letter-spacing: 2px; font-size: 2.2rem; margin-bottom: 40px; }

        .rooms-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        
        .room-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; text-align: left; position: relative; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box;}
        .room-card:hover { transform: translateY(-5px); border-color: #FFD342; box-shadow: 0 10px 25px rgba(255, 211, 66, 0.2); }
        .room-status { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: #bdc3c7; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 12px;}
        .status-circle { width: 10px; height: 10px; border-radius: 50%; }
        .status-circle.green { background-color: #2df2c1; box-shadow: 0 0 10px rgba(45, 242, 193, 0.5); }
        .status-circle.red { background-color: #cc2a2a; box-shadow: 0 0 10px rgba(204, 42, 42, 0.5); }
        
        .room-name { 
            color: #FFD342; 
            font-size: 0.95rem;
            font-weight: bold; 
            margin: 0 0 15px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            white-space: nowrap;
            overflow: hidden; 
            text-overflow: ellipsis;
            padding-right: 60px;
        }
        
        .room-link-container { 
            width: 100%;
            box-sizing: border-box;
            font-size: 0.8rem; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .room-link-text { color: #3498db; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .copy-btn { background: transparent; border: none; color: #bdc3c7; cursor: pointer; font-size: 1.1rem; transition: 0.3s; padding-left: 10px; }
        .copy-btn:hover { color: #FFD342; transform: scale(1.1); }

        .room-jugar-btn { width: 100%; background: rgba(255, 211, 66, 0.1); color: #FFD342; border: 1px solid #FFD342; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; text-decoration: none; cursor: pointer; transition: 0.3s; text-align: center; display: block; box-sizing: border-box;}
        .room-jugar-btn:hover { background: #FFD342; color: #111; transform: translateY(-2px); box-shadow: 0 0 15px rgba(255, 211, 66, 0.3); }
        .room-card.inactive { opacity: 0.6; }
        .room-card.inactive:hover { border-color: rgba(255, 255, 255, 0.1); box-shadow: none; transform: none; }
        .room-jugar-btn.offline { color: #cc2a2a; border-color: #cc2a2a; background: rgba(204, 42, 42, 0.05); pointer-events: none; }
        
        @media (max-width: 900px) { .rooms-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            .rooms-title { font-size: 1.8rem; margin-top: 20px;} 
            .rooms-grid { grid-template-columns: 1fr; gap: 15px;} 
            .room-card { padding: 20px 15px; }
            .room-name { padding-right: 50px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header></header>

    <main class="rooms-section">
        <h2 class="rooms-title">Salas de HaxBall en Vivo</h2>
        
        <div class="rooms-grid" id="salas-container">
            <p style="color: #FFD342;">⏳ Buscando salas...</p>
        </div>
    </main>

    <footer>
        <p>© 2026 ToroHax. Todos los derechos reservados.</p>
    </footer>

    <script src="header.js"></script>
    <script src="sidebar.js"></script>

    <script>
        function copiarLink(link, btnElement) {
            navigator.clipboard.writeText(link).then(() => {
                const icon = btnElement.querySelector('i');
                icon.className = 'fa-solid fa-check';
                icon.style.color = '#2df2c1';
                
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    icon.style.color = '';
                }, 2000);
            }).catch(err => {
                console.error("Error al copiar: ", err);
            });
        }

        async function cargarSalas() {
            try {
                const response = await fetch('https://torobot-izu5.onrender.com/api/active-rooms');
                const salas = await response.json();
                const container = document.getElementById('salas-container');
                container.innerHTML = ''; 

                if (salas.length === 0) {
                    container.innerHTML = `
                        <div class="room-card inactive">
                            <div class="room-status">
                                <span class="status-circle red"></span>
                            </div>
                            <h4 class="room-name">Mantenimiento [TH]</h4>
                            <div class="room-link-container" style="justify-content: center;">
                                <span class="room-link-text" style="color:#7d7d7d;">Sala apagada actualmente</span>
                            </div>
                            <span class="room-jugar-btn offline">OFFLINE</span>
                        </div>
                    `;
                    return;
                }

                salas.forEach(sala => {
                    const linkLimpio = sala.link ? sala.link.replace('https://', '') : 'Esperando link...';
                    
                    container.innerHTML += `
                        <div class="room-card">
                            <div class="room-status">
                                <span class="status-circle green"></span>
                                <span>${sala.players}/${sala.maxPlayers}</span>
                            </div>
                            <h4 class="room-name" title="${sala.name}">${sala.name}</h4>
                            
                            <div class="room-link-container">
                                <span class="room-link-text">🌐 ${linkLimpio}</span>
                                <button class="copy-btn" onclick="copiarLink('${sala.link}', this)" title="Copiar enlace">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                            </div>
                            
                            <a href="${sala.link}" target="_blank" rel="noopener noreferrer" class="room-jugar-btn">JUGAR</a>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error cargando salas:", error);
                document.getElementById('salas-container').innerHTML = `<p style="color: #cc2a2a;">❌ Error al conectar con el servidor ToroBot.</p>`;
            }
        }

        cargarSalas();
        setInterval(cargarSalas, 10000);
    </script>
</body>
</html>
